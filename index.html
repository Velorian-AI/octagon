        <button class="btn ghost" onclick="toggleRoundPause()" id="rtPause">${st.running?'Pause':'Resume'}</button>
        <button class="btn danger" onclick="stopRoundTimer()">End</button>
      </div></div></div>`;
  document.body.style.overflow='hidden';
}
function roundTick(){
  const st=roundState;if(!st.running)return;
  st.remaining--;
  if(st.remaining===10)beep(660,150);
  if(st.remaining<0){
    if(st.phase==='fight'){
      beep(440,180);setTimeout(()=>beep(440,180),200);
      if(st.round>=st.rounds){beep(880,200);setTimeout(()=>beep(880,200),250);setTimeout(()=>beep(880,400),500);
        stopRoundTimer();toast('Session complete 🥊','green');return;}
      st.phase='rest';st.remaining=st.rest;
    }else{st.phase='fight';st.round++;st.remaining=st.len;beep(660,180);}
    renderRoundTimer();return;
  }
  const cl=$('#rtClock');if(cl)cl.textContent=fmtClock(st.remaining);
  const total=st.phase==='fight'?st.len:st.rest;const circ=2*Math.PI*120;
  const ring=$('#rtRing');if(ring)ring.setAttribute('stroke-dashoffset',circ*(1-(total-st.remaining)/total));
}
function toggleRoundPause(){roundState.running=!roundState.running;$('#rtPause').textContent=roundState.running?'Pause':'Resume';}
function stopRoundTimer(){clearInterval(roundTimer);roundTimer=null;roundState=null;closeModal();}

function drawWeightChart(){
  const cv=$('#weightChart');if(!cv)return;const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,pad=40;ctx.clearRect(0,0,W,H);
  const log=S.weightLog;if(log.length<1){ctx.fillStyle='#888';ctx.font='14px Inter';ctx.textAlign='center';ctx.fillText('Log your weight to see the trend',W/2,H/2);return;}
  const weights=log.map(w=>toDisplayW(w.weight));const tw=S.targetWeight?toDisplayW(S.targetWeight):null;
  let min=Math.min(...weights,tw||Infinity),max=Math.max(...weights,tw||-Infinity);
  const range=Math.max(1,max-min);min-=range*.15;max+=range*.15;
  const x=i=>pad+(W-pad*1.5)*(log.length===1?0.5:i/(log.length-1));
  const y=v=>H-pad-(H-pad*2)*((v-min)/(max-min));
  // grid
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;ctx.fillStyle='#888';ctx.font='10px JetBrains Mono';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const v=min+(max-min)*i/4;const yy=y(v);ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(W-pad/2,yy);ctx.stroke();ctx.fillText(v.toFixed(1),pad-6,yy+3);}
  // target line
  if(tw){ctx.strokeStyle='#E63946';ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(pad,y(tw));ctx.lineTo(W-pad/2,y(tw));ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#E63946';ctx.textAlign='left';ctx.fillText('TARGET '+tw.toFixed(1),pad+4,y(tw)-6);}
  // line
  ctx.strokeStyle='#C8A84B';ctx.lineWidth=2.5;ctx.beginPath();
  log.forEach((w,i)=>{const xx=x(i),yy=y(toDisplayW(w.weight));i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy);});ctx.stroke();
  log.forEach((w,i)=>{ctx.beginPath();ctx.arc(x(i),y(toDisplayW(w.weight)),3.5,0,Math.PI*2);ctx.fillStyle='#C8A84B';ctx.fill();
    ctx.strokeStyle='#0A0A0A';ctx.lineWidth=2;ctx.stroke();});
}

function condCut(){

  return`<div class="section-title">Weight Cut Planner<span class="ln"></span></div>

      <label class="field" style="margin:0"><span>Fight date</span><input class="inp" type="date" id="cutDate" value="${S.profile.nextEvent||''}"></label>
    </div><button class="btn block mt" onclick="generateCut()">Generate Cut Plan</button></div>
    <div id="cutResult">${p?renderCutPlan(p):'<p class="muted fz12">Enter your numbers to generate a safe, day-by-day cut plan.</p>'}</div>`;
}
function generateCut(){
  const cur=fromDisplayW(+$('#cutCurrent').value),fight=fromDisplayW(+$('#cutFight').value),date=$('#cutDate').value;
  if(!cur||!fight||!date){toast('Fill all fields','red');return;}
  const days=daysUntil(date);
  if(days===null||days<0){toast('Fight date must be in the future','red');return;}
  const totalCut=cur-fight;const pctBody=totalCut/cur*100;
  const plan={cur,fight,date,days,totalCut,pctBody,
    warning:pctBody>10||days<7,
    schedule:[]};
  // gradual cut: ~70% gradual diet, last 5 days water manipulation
  const waterDays=Math.min(5,Math.max(0,days));const dietDays=days-waterDays;
  const dietTarget=fight+totalCut*0.30; // by end of diet phase, ~within 30% (water weight) of fight weight
  for(let d=0;d<=days;d++){
    const daysOut=days-d;let target,water,sodium,note;
    if(daysOut>waterDays){
      const prog=dietDays>0?(dietDays-(daysOut-waterDays))/dietDays:1;
      target=cur-(cur-dietTarget)*prog;
      water=isMetric()?'4–5 L':'135–170 oz';sodium='Normal (2–3g)';note='Clean diet, train as normal';
    }else{
      const wprog=waterDays>0?(waterDays-daysOut)/waterDays:1;
      target=dietTarget-(dietTarget-fight)*wprog;
      if(daysOut>=3){water=isMetric()?'6–8 L (water load)':'200–270 oz (load)';sodium='Cut to <1g';note='Water loading phase';}
      else if(daysOut>=1){water=isMetric()?'1–2 L (taper)':'34–68 oz (taper)';sodium='Zero added';note='Water taper · carb deplete';}
      else{water='Sips only';sodium='Zero';note='Weigh-in day · then rehydrate immediately';}
    }
    plan.schedule.push({daysOut,target:+target.toFixed(1),water,sodium,note});
  }
  S.cutPlan=plan;save();$('#cutResult').innerHTML=renderCutPlan(plan);toast('Cut plan generated','green');
}
function renderCutPlan(p){
  return`${p.warning?`<div class="banner"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
    <div><b>Caution:</b> ${p.pctBody>10?`This cut is ${p.pctBody.toFixed(1)}% of body weight — above the 10% safe threshold. `:''}${p.days<7?`Only ${p.days} days out — that's a compressed timeline. `:''}Consult a qualified nutritionist or coach before attempting this. Aggressive cuts are dangerous.</div></div>`:''}
    <div class="grid g3 keep mb">
      <div class="stat-box"><div class="k">Total Cut</div><div class="v gold">${toDisplayW(p.totalCut).toFixed(1)}<small>${wUnit()}</small></div></div>
      <div class="stat-box"><div class="k">% Body Weight</div><div class="v ${p.pctBody>10?'':'gold'}" style="${p.pctBody>10?'color:var(--red)':''}">${p.pctBody.toFixed(1)}<small>%</small></div></div>
      <div class="stat-box"><div class="k">Days Out</div><div class="v">${p.days}</div></div>
    </div>
    <div class="card"><table class="dt"><thead><tr><th>Days Out</th><th>Target</th><th>Water</th><th>Sodium</th><th>Protocol</th></tr></thead><tbody>
    ${p.schedule.map(s=>`<tr><td class="mono">${s.daysOut===0?'FIGHT':s.daysOut}</td><td class="mono gold">${toDisplayW(s.target).toFixed(1)}${wUnit()}</td>
      <td class="fz12">${s.water}</td><td class="fz12">${s.sodium}</td><td class="fz12 muted">${s.note}</td></tr>`).join('')}</tbody></table></div>`;
}

  const side=/\bleft\b|(^|\s)l(\s|$)/.test(p)?'L':/\bright\b|(^|\s)r(\s|$)/.test(p)?'R':'';
  const sd=d=>side||d;
  if(/head|skull|jaw|face|nose|eye|chin|orbital/.test(p))return'head';
  if(/neck|cervical|trap/.test(p))return'neck';
  if(/shoulder|delt|rotator|\bac\b/.test(p))return'shoulder'+sd('R');
  if(/elbow|bicep|tricep|forearm|wrist|upper arm/.test(p))return'arm'+sd('R');
  if(/hand|finger|knuckle|thumb/.test(p))return'hand'+sd('R');
  if(/chest|pec|rib|sternum/.test(p))return'chest';
  if(/core|\bab|oblique|stomach|abdomen|back|spine|lat|lumbar/.test(p))return'core';
  if(/hip|groin|pelvis|glute/.test(p))return'hip';
  if(/thigh|quad|hamstring|femur/.test(p))return'thigh'+sd('L');
  if(/knee|acl|mcl|meniscus|patella/.test(p))return'knee'+sd('L');
  if(/shin|calf|tibia/.test(p))return'shin'+sd('L');
  if(/foot|ankle|toe|heel|achilles/.test(p))return'foot'+sd('L');
  return'core';
}

/* ---------- lightweight markdown renderer (safe) ---------- */
function md(text){
  let h=esc(text);
  // code blocks
  h=h.replace(/```([\s\S]*?)```/g,(m,c)=>`<pre style="background:var(--void);border:1px solid var(--line);padding:12px;border-radius:2px;overflow-x:auto;font-family:var(--font-mono);font-size:12px;white-space:pre-wrap">${c.trim()}</pre>`);
  h=h.replace(/`([^`]+)`/g,'<code style="background:var(--void);padding:1px 5px;border-radius:2px;font-family:var(--font-mono);font-size:.9em">$1</code>');
  // headers
  h=h.replace(/^### (.*)$/gm,'<h3 style="font-size:18px;margin:14px 0 6px;color:var(--gold)">$1</h3>');
  h=h.replace(/^## (.*)$/gm,'<h3 style="font-size:21px;margin:16px 0 8px;color:var(--gold)">$1</h3>');
  h=h.replace(/^# (.*)$/gm,'<h3 style="font-size:24px;margin:16px 0 8px;color:var(--gold)">$1</h3>');
  // bold/italic
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  h=h.replace(/(^|[^*])\*([^*]+)\*/g,'$1<i>$2</i>');
  // bullets
  h=h.replace(/^[\-\*] (.*)$/gm,'<li style="margin:3px 0 3px 18px">$1</li>');
  h=h.replace(/(<li[\s\S]*?<\/li>)(?!\s*<li)/g,'<ul style="margin:6px 0;list-style:disc">$1</ul>');
  // numbered
  h=h.replace(/^\d+\. (.*)$/gm,'<li style="margin:3px 0 3px 18px">$1</li>');
  // paragraphs / line breaks
  h=h.replace(/\n{2,}/g,'</p><p style="margin:8px 0">').replace(/\n/g,'<br>');
  return`<p style="margin:8px 0">${h}</p>`;
}

const AI_MODEL='claude-sonnet-4-6';

//   1. CONFIG.aiProxyUrl      → your serverless endpoint holds the key (best for public apps)
//   2. CONFIG.anthropicApiKey → calls Anthropic directly from the browser (simplest)
//   3. Managed Supabase login → Edge Function proxy (optional fallback for synced users)
function builtinAIEnabled(){return !!(CONFIG.aiProxyUrl||CONFIG.anthropicApiKey);}
function managedAIEnabled(){return !!(S.cloud&&S.cloud.userId&&S.cloud.url);}

function aiConfigured(){return builtinAIEnabled()||managedAIEnabled();}

// and film review just work for every user without logging in.
async function aiRequestConfig(){
  // 1. Owner-hosted proxy endpoint (no auth, key lives server-side)
  if(CONFIG.aiProxyUrl){
    return{endpoint:CONFIG.aiProxyUrl,headers:{'Content-Type':'application/json'}};
  }
  // 2. Direct-to-Anthropic from the browser using the embedded key
  if(CONFIG.anthropicApiKey){
    return{endpoint:'https://api.anthropic.com/v1/messages',headers:{
      'Content-Type':'application/json',
      'x-api-key':CONFIG.anthropicApiKey,
      'anthropic-version':ANTHROPIC_VERSION,
      'anthropic-dangerous-direct-browser-access':'true'
    }};
  }
  // 3. Optional managed path for signed-in cloud users
  if(S.cloud&&S.cloud.userId&&S.cloud.url){
    const sb=await ensureClient();
    const {data}=await sb.auth.getSession();
    const token=data&&data.session&&data.session.access_token;
    if(token)return{endpoint:aiProxyEndpoint(),headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,'apikey':S.cloud.anonKey},managed:true};
  }
  throw new Error('AI not configured: add CONFIG.anthropicApiKey (or CONFIG.aiProxyUrl) at the top of octagon.html.');
}
// turn raw API/network failures into something a fighter can act on
function friendlyAIError(e){
  const m=String(e&&e.message||e||'').toLowerCase();
  if(!navigator.onLine||m.includes('failed to fetch')||m.includes('networkerror')||m.includes('load failed'))
    return 'No internet connection. The AI coach needs to be online — reconnect and try again.';
  if(m.includes('not configured')||m.includes('no api key')||m.includes('credit balance'))
    return 'The AI coach isn’t wired up for this build yet — add an Anthropic key (or proxy URL) in CONFIG at the top of octagon.html.';
  if(m.includes('401')||m.includes('unauthorized')||m.includes('authentication')||m.includes('jwt'))
    return 'The AI couldn’t authenticate — double-check the Anthropic key in CONFIG at the top of octagon.html.';
  if(m.includes('404')||m.includes('not found')||m.includes('function'))
    return 'The AI endpoint couldn’t be reached — check CONFIG.aiProxyUrl at the top of octagon.html.';
  if(m.includes('429')||m.includes('rate_limit')||m.includes('rate limit'))
    return 'Your coach is busy right now (rate limit hit). Wait ~60 seconds and try again.';
  if(m.includes('overloaded')||m.includes('529'))
    return 'Anthropic is overloaded right now. Give it a moment and retry.';
  if(m.includes('500')||m.includes('502')||m.includes('503'))
    return 'The AI service had a server error. Try again shortly.';
  return (e&&e.message)||'Something went wrong reaching the coach.';
}

   b:["Drive the knee up first, then extend — it's a straight-line push, not a swing.","Use it to manage distance, interrupt pressure, and break rhythm.","Lead-leg teep keeps aggressive pressure fighters off you; rear teep digs into the body.","Recover the foot straight back to stance so you're not caught on one leg."],
   drill:'Partner holds a pad and walks you down; teep to stop the advance for 3 rounds.'},
  {k:['takedown','double leg','single leg','shot','wrestling','td'],t:'Takedowns — Level Change & Entries',
   b:["Change levels with your knees, not your back — chest up, eyes up the whole way in.","Set up shots behind strikes: a 1-2 freezes the hands, then drop on the double.","Penetration step deep, drive off the back leg, and turn the corner — don't stall on the legs.","On the single: head inside, run the pipe or lift-and-turn; never leave your head out."],
   drill:'Reactive shots: partner throws a lazy 1-2, you slip and shoot. 4 rounds of 10 entries.'},
  {k:['sprawl','takedown defense','td defense','stuff','taken down','take down','keep getting taken','defend takedown','stop the takedown'],t:'Takedown Defense & The Sprawl',
   b:["React early — sprawl the moment you feel the level change, hips heavy, legs kicked back.","Frame on the head/biceps and circle away from the trapped side.","Underhooks are everything; win the inside, peel the hands, and stand back up.","Don't fight from your knees — wrestle up immediately before they settle into the position."],
   drill:'Sprawl-and-spin: partner shoots, you sprawl, spin to the back, reset. 5 rounds.'},
  {k:['guard','closed guard','bottom','sweep'],t:'Playing Guard',
   b:["Posture control first — break their posture down so they can't strike or pass.","Always have three things working: a sweep, a submission, and a stand-up.","Off-balance them constantly; a guard that doesn't threaten gets passed.","In MMA, look to stand up or sweep rather than hunting subs from your back under strikes."],
   drill:'Positional rolls starting in closed guard, 3-min rounds, reset every pass or sweep.'},
  {k:['mount','top control','side control','pass','passing'],t:'Top Position & Passing',
   b:["Pressure passing: kill the hips, stay chest-to-chest, and march the legs around.","In mount, climb high and trap an arm before hunting the finish.","Heavy hips beat fast hands on the ground — control before you attack.","Re-pin every time they create space; patience smothers the scramble."],
   drill:'Guard-passing rounds: 3 minutes to pass, partner resets you each time you clear the legs.'},
  {k:['submission','choke','armbar','triangle','rear naked','rnc','submit'],t:'Finishing Submissions',
   b:["Control before you attack — a submission off a position you don't own is a free escape for them.","Rear naked: cut the angle, get the seatbelt, fight one hand at a time to the neck.","Triangle: control posture, cut the angle (don't just squeeze straight on), pull the head.","Armbar: pinch the knees, control the wrist to your chest, hips high, slow and tight."],
   drill:'Submission entries from dominant positions, 50 controlled reps, partner gives graded resistance.'},
  {k:['clinch','plum','thai clinch','knees','dirty boxing'],t:'The Clinch',
   b:["Win the inside — double underhooks or a tight collar tie beats long arms every time.","Break posture and off-balance before you knee; a square opponent eats knees.","Use the clinch to rest a tiring opponent or to set up takedowns and trips.","Pummel constantly; never let them settle into a controlling grip."],
   drill:'Clinch pummeling for inside position, 4x2min, score a knee or trip every time you win underhooks.'},
  {k:['footwork','movement','angles','cut off','pivot'],t:'Footwork & Angles',
   b:["Small steps, always back to stance — never cross your feet in range.","Step off-line after combinations so you're not standing where you just threw.","Cut angles to attack a turned hip; straight-back retreats get you caught.","Control the center; make the opponent reset their feet and hit them on the move."],
   drill:'Shadowbox tracing a square: throw, pivot to a new corner, throw again. 3 rounds.'},
  {k:['head movement','slip','roll','defense','defence','block'],t:'Head Movement & Defense',
   b:["Slip with the legs and core, not just the neck — small, economical movement keeps you balanced.","Always slip to a counter: slip the jab and fire the cross, roll the hook and dig the body.","Don't stay in the pocket after defending — slip, counter, then exit on an angle.","Keep your eyes on the chest; you'll see everything in your peripheral vision."],
   drill:'Partner throws single shots at 50%, you slip/roll and return one counter. 4 rounds.'},
  {k:['cardio','conditioning','gas','tired','endurance','fatigue','gas tank'],t:'Conditioning for Fighting',
   b:["Fight-specific cardio beats steady running — train the way you fight: hard bursts, short rest.","Round-based intervals: 5 min hard / 1 min rest mirrors the demand and trains recovery.","Add anaerobic capacity work in fight camp (hard rounds), aerobic base in the off-season.","Most 'gassing' is wasted motion and tension — relax in the pocket and breathe out on strikes."],
   drill:'Bag/pad intervals: 5x(5min work, 1min rest) at fight pace, log your output round by round.'},
  {k:['weight','cut','make weight','dehydrate','rehydrate'],t:'Weight Management',
   b:["Walk around no more than ~8% above your fight weight; big cuts wreck performance.","Cut water in the final 24-36h, not fat — lean nutrition manages the base weight for weeks before.","Rehydrate with electrolytes + carbs immediately after the weigh-in; sip, don't flood.","If the required cut is brutal every camp, move up a division — health and performance win."],
   drill:null},
  {k:['nervous','anxiety','scared','fear','mental','mindset','nerves','confidence'],t:'Fight-Night Mindset',
   b:["Nerves mean you care — reframe the adrenaline as readiness, not threat.","Box breathing (4-4-4-4) before you walk out steadies the heart rate and the mind.","Focus on process, not outcome: your job is to execute the game plan, one exchange at a time.","Visualise the fight going your way nightly in camp; rehearse adversity and your response to it."],
   drill:'Nightly 5-min visualisation: see yourself executing your game plan and recovering from a bad moment.'},
  {k:['camp','prepare','prep','training plan','periodization','periodisation'],t:'Structuring a Fight Camp',
   b:["8 weeks is a solid camp: weeks 1-3 build volume, 4-6 sharpen and spar hard, 7 taper, week 8 fight.","Peak your hard sparring 2-3 weeks out, then back off — you don't get fitter in the last week, only tired.","Front-load conditioning; shift to technical sharpness and game-plan reps as the fight nears.","Schedule deload days — adaptation happens in recovery, not in the grind."],
   drill:null},
  {k:['uppercut','upper cut'],t:'The Uppercut',
   b:["Slight dip in the knees, then drive up through the legs — the power is vertical, from the floor.","Keep the elbow under the fist; don't flare it out or it becomes a slow, telegraphed shovel.","It lands inside a tight guard and on anyone ducking or coming forward.","Best hidden in combinations — cross to the head, then the uppercut splits the guard."],
   drill:'Bag work: hook-uppercut-hook on the inside, 5 rounds, keep the off-hand pinned to your chin.'},
  {k:['overhand','over hand','looping'],t:'The Overhand',
   b:["Arc it over the opponent's jab — step the lead foot offline as you throw to clear their centre.","It's a power shot off the back hand; commit the hips and shoulder fully.","High-risk, high-reward — recover your head and reset fast, you're exposed on the way in.","Lands beautifully on a fighter who jabs and stands tall, or against a southpaw's open side."],
   drill:'Pad drill: slip the jab outside, answer with the overhand, exit on an angle. 4 rounds.'},
  {k:['elbow','elbows'],t:'Elbows',
   b:["Short range only — turn the hips and shoulder and cut with the point of the elbow, not the forearm.","Horizontal elbow slashes across the temple/jaw; the upward elbow splits the guard underneath.","Best off a clinch break, as they close in, or to finish a boxing combination at close range.","Keep the off-hand defending — elbows put your face right in their range."],
   drill:'Clinch-to-elbow: break the plum, fire a horizontal elbow, reset. 4x2min.'},
  {k:['knee','knees','spear knee','clinch knee'],t:'Knee Strikes',
   b:["Drive the knee with the hips, not just the leg — thrust the hips forward and through the target.","From the clinch, pull the head/neck down to meet the knee for double the impact.","Straight knee to the body under the chest; diagonal/up-knee to the head as you break posture.","Point the toe down and tuck the heel to sharpen the 'spear' of the knee."],
   drill:'Thai pads: collar-tie pull into straight knee, alternate sides, 5 rounds, off-balance them first.'},
  {k:['combination','combo','combos','put together','sequence'],t:'Building Combinations',
   b:["Start and finish with different hands so you're always balanced and never caught mid-flurry.","Vary levels — head, body, head — to break the guard and the opponent's read.","Every combo should end with movement: pivot or step off-line so you're gone before the return.","Three to four strikes max in the pocket; longer and you're stationary and countered."],
   drill:'Shadowbox 6 set combos (e.g. jab-cross-hook, body-cross-hook), each ending in a pivot. 3 rounds.'},
  {k:['counter','counters','timing','read','catch them'],t:'Counter Striking',
   b:["Make them miss, then make them pay — defend with a purpose, never just to survive.","Pre-load the counter: know the cross is coming over your slipped jab and it's already loaded.","The check hook and the straight-right-over-the-jab are the two kings of counters.","Counter and immediately move off-line — don't admire it standing in the pocket."],
   drill:'Partner feeds single shots; you slip/parry and fire one clean counter, then exit. 4 rounds.'},
  {k:['distance','range','reach','spacing'],t:'Distance & Range Control',
   b:["Know your range and theirs — be just outside their reach and just inside yours.","The jab and the teep are your measuring sticks; use them to find and hold the line.","Against a longer fighter, win the entry; against a shorter one, hold them on the end of your shots.","Control distance with footwork first, hands second — feet keep you safe, hands punish."],
   drill:'Tag drill: light spar where you only score with the jab/teep at the very tip of range. 3 rounds.'},
  {k:['feint','feints','fake','setup','set up','set-up'],t:'Feints & Setups',
   b:["Sell the feint with the eyes, shoulders and feet — a twitch that gets no reaction is wasted.","Get a reaction, then punish the reaction: feint the jab, they cover, you go to the body.","Change rhythm — fast-fast-slow — so they can't time your real entries.","The threat of a takedown sets up the strike, and vice-versa. Make them defend two things."],
   drill:'Shadowbox 3 rounds where every real strike is preceded by a believable feint.'},
  {k:['pressure','aggressive','walked down','pushed back','backing up','cut off ring'],t:'Dealing With Pressure',
   b:["Never retreat in straight lines — circle off-angle so you're not herded into the cage.","Meet pressure with the lead teep and jab to break their forward momentum and reset distance.","Pivot off the cage the instant your back nears it; don't get pinned and smothered.","Make them pay for walking in — sharp counters discourage relentless pressure fast."],
   drill:'Partner walks you down on the pads; you circle, teep to reset, and counter. 4 rounds.'},
  {k:['beginner','start','new','getting started','first','noob','rookie','where do i begin'],t:'Starting Out — The First 90 Days',
   b:["Master stance and footwork before anything — balance is the base of every technique.","Drill the jab, cross, and the sprawl until they're reflex; they show up in every fight.","Spar light and often, with control — you learn timing live, not on the bag alone.","Build the habit first: 3-4 consistent sessions a week beats occasional heroic ones."],
   drill:'Daily 10-min shadowbox: stance, jab, cross, slip, pivot. Film it weekly and compare.'},
  {k:['spar','sparring','rolling','live'],t:'How to Spar Smart',
   b:["Spar with goals, not ego — pick one thing to work and let everything else be 60%.","Control the intensity; you can't improve technique while in survival mode.","Tap early and often in grappling — taps are reps, not losses.","Review honestly after: what got you hit, what landed, and one fix for next time."],
   drill:'Themed rounds: one round defense-only, one round jab-only, one round clinch-only.'},
  {k:['recovery','rest','sore','overtrain','overtraining','tired all','rest day','injury','injuries','hurt'],t:'Recovery & Staying Healthy',
   b:["Adaptation happens in rest, not the grind — schedule 1-2 full rest days a week.","Sleep is the #1 recovery tool: 7-9 hours, consistent times, dark and cool.","Train through soreness, never through sharp joint pain — that's how camps end.","Manage load: hard days hard, easy days genuinely easy. Avoid the grey-zone grind."],
   drill:null},
  {k:['nutrition','diet','eat','eating','food','meal','protein','fuel'],t:'Fueling the Fighter',
   b:["Protein anchors every meal (~1.6-2.2g/kg/day) to repair and hold muscle through camp.","Carbs are fuel, not the enemy — time them around your hardest sessions for output.","Hydrate daily, not just fight week; performance and recovery both live on water.","Eat mostly whole foods; you can't out-supplement a poor base diet."],
   drill:null},
  {k:['strength','power','lifting','weights','explosive','gym','s&c','strong'],t:'Strength & Power for Fighting',
   b:["Lift for power and rate of force, not the mirror — heavy compounds and explosive work.","2 short sessions a week in camp maintains strength without stealing recovery from skill work.","Train the posterior chain (hips, hamstrings, back) — that's where takedown and punch power lives.","Keep it specific and brief late in camp; you fight with your skills, strength just amplifies them."],
   drill:'Twice weekly: trap-bar deadlift or squat (3-5 reps) + med-ball throws for explosive power.'},
  {k:['flexibility','mobility','stretch','stretching','hips','kick higher','flexible'],t:'Mobility & Flexibility',
   b:["Dynamic mobility before training, longer static stretching after or on rest days.","Open the hips for head kicks and deep guard — hip flexibility unlocks both.","Daily 10 minutes beats a weekly hour; consistency drives the range.","Mobility is also injury insurance — supple joints absorb the chaos of sparring."],
   drill:'Daily 10-min routine: hip 90/90s, cossack squats, shoulder dislocates, deep squat holds.'},
  {k:['consistency','motivation','discipline','lazy','quit','consistent','habit','stick with','procrastin'],t:'Consistency & Discipline',
   b:["Motivation is unreliable — build systems and a schedule you follow when you don't feel like it.","Lower the activation energy: lay your kit out, fix set training times, remove the decision.","Track it — a streak you can see is a streak you protect. Don't break the chain.","Show up small on bad days; a 20-minute session keeps the identity of 'someone who trains' alive."],
   drill:null},
  {k:['southpaw','open stance','lefty','vs southpaw','orthodox vs'],t:'The Open-Stance (Southpaw) Battle',
   b:["Win the lead-foot battle — keep your front foot outside theirs to own the angle and power line.","The straight rear hand (cross) down the middle is the money punch in open stance.","Lead hook and rear round kick land on the open side; hunt them.","Watch their power hand and rear kick — those are the open-stance knockout shots."],
   drill:'Footwork drill vs a southpaw partner: constantly fight to step your lead foot outside theirs. 3 rounds.'}
];
function _kbScore(e,t){let s=0;for(const kw of e.k){if(t.includes(kw))s+=kw.length>4?2:1;}return s;}
function _kbMatch(text){
  const t=(' '+(text||'').toLowerCase()+' ');
  let best=null,bestScore=0;
  for(const e of COACH_KB){const s=_kbScore(e,t);if(s>bestScore){bestScore=s;best=e;}}
  return bestScore>0?best:null;
}
// Return up to n KB entries that the question touches, best first.
function _kbMatchAll(text,n){
  const t=(' '+(text||'').toLowerCase()+' ');
  return COACH_KB.map(e=>({e,s:_kbScore(e,t)})).filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s).slice(0,n||2).map(x=>x.e);
}
function _kbBlock(e){
  let out='## '+e.t+'\n\n'+e.b.map(x=>'- '+x).join('\n');
  if(e.drill)out+='\n\n**Drill this week:** '+e.drill;
  return out;
}
function _contextLine(){
  const p=S.profile||{};const bits=[];
  if(p.disciplines&&p.disciplines.length)bits.push('you train '+p.disciplines.join(', '));
  if(p.stance)bits.push(p.stance+' stance');
  if(p.style)bits.push((/^[aeiou]/i.test(p.style)?'an ':'a ')+p.style.toLowerCase()+' style');
  const dtf=daysUntil&&S.nextEvent&&S.nextEvent.date?daysUntil(S.nextEvent.date):null;
  if(dtf!=null&&dtf>=0)bits.push(dtf+' days to your next fight');
  return bits.length?('Given that '+bits.join(', ')+', '):'';
}
// Prioritised "what should I work on" answer, built from the fighter's own profile/log.
function _improvePlan(ctx){
  const p=S.profile||{};
  const disc=(p.disciplines&&p.disciplines.length)?p.disciplines.join(', '):'MMA';
  const recent=(S.sessions||[]).slice(0,4);
  let log='';
  if(recent.length){
    const types=[...new Set(recent.map(s=>s.type))];
    log="\n\n**Reading your recent log** ("+recent.map(s=>`${s.type} ${s.duration}min`).join(', ')+"): you've been heavy on "+types.slice(0,2).join(' & ')+". The fastest gains usually come from the area you're *avoiding* — be honest about which round you least like to start.";
  }
  return (ctx?ctx.charAt(0).toUpperCase()+ctx.slice(1):'')+"## What To Work On — In Order\n\n"+
    "1. **Fundamentals that show up every round** — stance, jab, sprawl, guard retention. Boring, but they win fights.\n"+
    "2. **Your worst position** — the place you panic (off your back? against the cage? in deep water late?). Drill *that* twice as much as your favourite.\n"+
    "3. **One signature weapon** — pick a single high-percentage finish or combo and make it world-class. Specialists beat generalists.\n"+
    "4. **Fight-specific conditioning** — round-based intervals so your skills don't disappear when you're tired."+
    log+"\n\nTell me which of these stings the most — *off my back, taking damage on the feet, gassing late, freezing under pressure* — and I'll build you a focused week.";
}
// Always-useful default for a question that didn't clearly hit the KB.
function _generalAnswer(raw,ctx){
  const e=_kbMatch(raw); // weak/any signal
  const topic=raw.replace(/[`*_#]/g,'').slice(0,120);
  if(e){
    return (ctx?ctx+'here\'s the technical answer:\n\n':'')+_kbBlock(e)+
      "\n\n_That's the closest read on “"+esc(topic)+"”. Want me to go deeper or tie it to a drill? Just ask._";
  }
  // No signal at all — give real coaching principles instead of a deflection.
  return "Here's how I'd approach **“"+esc(topic)+"”**:\n\n"+
    "- **Break it to one problem** — what *specifically* is going wrong: you're getting hit, you can't land it, you lose the position, or you run out of gas? The fix changes completely with the answer.\n"+
    "- **Setup beats the technique** — most things fail because of the entry, not the finish. Nail the feint, level change, or grip that comes *before* it.\n"+
    "- **Drill it isolated, then alive** — slow reps for the mechanics, then add a resisting partner at 50%, then live rounds with it as your only goal.\n"+
    "- **Pressure-test honestly** — film one round hunting just this, then watch what actually happens versus what you think happens.\n\n"+
    (ctx?ctx+'tell me the exact moment it breaks down and I\'ll get specific.':'Give me the exact moment it breaks down — “getting countered by the cross”, “can’t finish the double”, “stuck under side control” — and I’ll get technical with cues and a drill.');
}
function localChatReply(text){
  const raw=(text||'').trim();
  const t=' '+raw.toLowerCase()+' ';
  const ctx=_contextLine();
  // Greetings / very short openers
  if(raw.length<3||/^(\s*)(hi|hey+|hello+|yo+|sup|hiya|howdy|good (morning|afternoon|evening)|what'?s up|wassup|gm|coach)[\s!.?]*$/i.test(raw)){
    return "I'm in your corner. Tell me what you're working on and I'll get technical — a punch or kick to sharpen, a position you keep losing, an opponent style you're facing, or camp stuff like conditioning, the weight cut, or nerves.\n\n**What do you want to drill first?**";
  }
  // Meta / capability questions
  if(/(what can you|who are you|^help| help$|how does this work|what do you do|what should i ask)/i.test(t)){
    return "## Your Coach\n\nAsk me anything in your game and I'll give cues, drills, and a plan:\n\n- **Striking** — jab, cross, hooks, uppercuts, overhand, elbows, knees, every kick, head movement, footwork, counters, combinations.\n- **Wrestling** — takedowns, sprawl, clinch, cage work.\n- **Ground** — guard, passing, top control, escapes, every major submission.\n- **Camp** — conditioning, strength, weight cut, nutrition, mindset/nerves, periodisation, recovery.\n\nTry: *“how do I stop getting countered by the cross”*, *“build me a conditioning week”*, or *“what should I work on”*.";
  }
  // Multiple KB topics
  const hits=_kbMatchAll(raw,2);
  if(hits.length){
    const head=ctx?ctx+'here\'s how I\'d attack this:\n\n':'';
    return head+hits.map(_kbBlock).join('\n\n---\n\n')+"\n\n_Want me to go deeper on any of these or build it into your week? Just ask._";
  }
  // "What should I work on / how do I improve"
  if(/(work on|improve|get better|getting better|focus on|priorit|what should i|where do i start|next level|my weakness|weak(est)? (point|area|spot))/i.test(t)){
    return _improvePlan(ctx);
  }
  // Anything else — still answer usefully, never deflect.
  return _generalAnswer(raw,ctx);
}
function localSparBreakdown(text){
  const t=(text||'').toLowerCase();
  const flags=[];
  const tests=[
    [/(right hand|cross|overhand)/,'Getting caught by the rear hand suggests your lead hand or head isn\'t returning — slip outside the cross and counter with your own.'],
    [/(hook|left hook)/,'Eating hooks means your guard drops or you square up after combinations. Keep the rear hand glued and exit on an angle.'],
    [/(takedown|taken down|shot|wrestl)/,'Takedown issues: sprawl earlier, fight for underhooks, and keep your hips back when pressure builds.'],
    [/(tired|gassed|fatigue|cardio|slow)/,'Fading in later rounds is a conditioning + relaxation problem — breathe out on strikes and cut wasted tension.'],
    [/(kick|leg kick|calf)/,'Leg kicks landing on you? Check with the shin and return fire immediately so they pay for every kick.'],
    [/(clinch|knee)/,'In the clinch, win the inside (underhooks/collar tie) and break posture before they can knee or trip you.'],
    [/(pressure|forward|walked down|cage)/,'Against pressure, use the jab and lead teep to reset distance, and circle off the cage rather than backing straight up.'],
    [/(counter|timing|read)/,'Getting timed? Vary your rhythm, feint before committing, and don\'t throw the same entry twice in a row.']
  ];
  for(const [re,msg] of tests){if(re.test(t))flags.push(msg);}
  while(flags.length<3)flags.push([
    'Watch your stance under fatigue — feet drifting too wide or narrow kills both power and defense.',
    'Reset on angles after every combination so you\'re never standing in front of the return.',
    'Tighten your guard return — the hand that throws should be the first one back home.'
  ][flags.length]);
  const strength = /(good|landed|caught them|rocked|dropped|sharp|felt great)/.test(t)
    ? 'You noted moments where your offense landed clean — that\'s your anchor. Build sequences that start from what\'s already working.'
    : 'Your willingness to spar and review tape honestly is the strength — that habit is what actually builds fighters.';
  return `## What's Happening\nFrom your notes, the recurring theme is reacting a beat late and giving up your defensive structure during exchanges.\n\n## Habits Opponents Will Exploit\n${flags.slice(0,3).map((f,i)=>`${i+1}. ${f}`).join('\n')}\n\n## Three Fixes This Week\n1. **Defense-first rounds** — spar one round only countering; you may not throw first. Rebuilds your reactions.\n2. **Return-to-guard reps** — on the bag, the throwing hand snaps back before the next punch fires. 5 rounds.\n3. **Angle exits** — after every combo, pivot off-line. Drill it shadowboxing until it's automatic.\n\n## Reinforce This Strength\n${strength}\n\n_Add an Anthropic key in CONFIG for frame-by-frame video analysis — but this breakdown runs on your notes with no setup._`;
}
function localGamePlan(text){
  const t=(text||'').toLowerCase();
  let style='balanced';
  if(/wrestl|takedown|grappl|top control/.test(t))style='wrestler';
  else if(/strik|boxer|kickbox|muay|hands|knockout/.test(t))style='striker';
  else if(/jiu|bjj|submission|guard/.test(t))style='grappler';
  else if(/pressure|forward|aggressive|walk/.test(t))style='pressure';
  else if(/counter|patient|timing/.test(t))style='counter';
  const plans={
    wrestler:{threat:'Their takedowns and top control. They want to drag this to the mat and grind.',
      gp:['Win the takedown battle at the fence — frame, underhook, and wrestle up immediately.','Keep the fight in open space; circle off the cage where their shots are weakest.','Make them pay for level changes with knees and uppercuts as they shoot.','Stuff the first shot hard — discouraging the wrestler early changes the whole fight.']},
    striker:{threat:'Their striking volume and power at range. They thrive in clean kickboxing exchanges.',
      gp:['Change levels and close the distance — make it a grappling/clinch fight on your terms.','Don\'t stand and trade in the pocket; either be out of range or tied up.','Use the jab and feints to enter behind, then take them down or clinch.','Pressure with intent — strikers hate fighting going backwards and against the cage.']},
    grappler:{threat:'Their guard, submissions, and scrambles. Danger increases the longer you stay on the mat.',
      gp:['Keep it standing — strike at range and stuff their entries to the body lock.','If you do go down, stay heavy on top or stand back up; never sit in their guard.','Defend the neck and arms at all times; don\'t give up your back in scrambles.','Win the rounds with volume on the feet and dictate where the fight happens.']},
    pressure:{threat:'Relentless forward pressure and volume that drowns opponents in later rounds.',
      gp:['Meet pressure with pressure or sharp lateral movement — never just retreat in straight lines.','Lead teep and jab to break their advance and reset the distance.','Circle off the cage early before you get pinned; make them reset their feet.','Bank rounds early and force them to wade through your counters to get inside.']},
    counter:{threat:'A patient counter-fighter who punishes your mistakes and waits for openings.',
      gp:['Feint heavily — make them commit to a counter, then capitalise on the opening they show.','Vary rhythm and entries; never give them the same look twice to time.','Mix levels (body, takedowns) so they can\'t sit on a single counter.','Take the center and apply measured pressure to force them to lead.']},
    balanced:{threat:'A well-rounded opponent with no glaring hole — discipline wins this one.',
      gp:['Establish the jab and lead leg kick early to set every other tool up.','Test the takedown and the clinch in round one to find where they\'re weakest.','Bank rounds with volume and ring control; don\'t gamble in even exchanges.','Adjust live — whatever lands twice cleanly, double down on it.']}
  };

function localJournalFollowup(text){

function localFromMessages(messages,system){
  system=String(system||'');

  if(last){
    if(typeof last.content==='string')text=last.content;
    else if(Array.isArray(last.content))text=last.content.filter(b=>b&&b.type==='text').map(b=>b.text).join('\n');
  }
  if(/sparring session/i.test(system))return localSparBreakdown(text);
  if(/game plan/i.test(system))return localGamePlan(text);

/* ============================================================
   ON-DEVICE OPEN-SOURCE AI  (WebLLM — runs Llama/Qwen in the browser
   via WebGPU; no API key, no account, no backend, no data leaves the
   device). Lazy-loaded only when the user turns it on. Any failure
   silently falls back to the built-in local coach engine above.
   ============================================================ */
const WEBLLM_MODELS=[
  {id:'Llama-3.2-1B-Instruct-q4f16_1-MLC',name:'Llama 3.2 1B',size:'~0.9 GB',note:'Fastest — light devices'},
  {id:'Qwen2.5-1.5B-Instruct-q4f16_1-MLC',name:'Qwen2.5 1.5B',size:'~1.1 GB',note:'Balanced'},
  {id:'Llama-3.2-3B-Instruct-q4f16_1-MLC',name:'Llama 3.2 3B',size:'~2.2 GB',note:'Smartest — best answers'}
];
let _webllmLib=null, webllmEngine=null, webllmStatus='idle', webllmProgress={pct:0,text:''};
function webllmSupported(){try{return typeof navigator!=='undefined'&&!!navigator.gpu;}catch(e){return false;}}
function localAIOn(){return !!(S.localAI&&S.localAI.enabled);}
function localAIModelId(){return (S.localAI&&S.localAI.model)||WEBLLM_MODELS[2].id;}
function localAIModelName(){const m=WEBLLM_MODELS.find(x=>x.id===localAIModelId());return m?m.name:'On-device AI';}
// Load (download + compile) the chosen model. Heavy + user-initiated.
async function loadWebLLM(onProgress){
  if(webllmEngine&&webllmStatus==='ready')return webllmEngine;
  if(!webllmSupported())throw new Error('This browser has no WebGPU. On-device AI needs desktop Chrome/Edge, or a recent Safari/Chrome on a capable device.');
  webllmStatus='loading';webllmProgress={pct:0,text:'Starting…'};
  try{
    if(!_webllmLib)_webllmLib=await import('https://esm.run/@mlc-ai/web-llm');
    const model=localAIModelId();
    webllmEngine=await _webllmLib.CreateMLCEngine(model,{initProgressCallback:(p)=>{
      webllmProgress={pct:Math.round((p.progress||0)*100),text:p.text||''};
      if(onProgress)onProgress(webllmProgress);
    }});
    webllmStatus='ready';
    return webllmEngine;
  }catch(e){webllmStatus='error';webllmEngine=null;throw e;}
}
function _webllmMsgs(messages,system){
  const out=[];
  if(system)out.push({role:'system',content:String(system)});
  for(const m of (messages||[])){
    let c=m.content;
    if(Array.isArray(c))c=c.filter(b=>b&&b.type==='text').map(b=>b.text).join('\n');
    out.push({role:m.role==='assistant'?'assistant':'user',content:String(c||'')});
  }
  return out;
}
async function webllmGenerate(messages,system,maxTokens){
  const eng=await loadWebLLM();
  const r=await eng.chat.completions.create({messages:_webllmMsgs(messages,system),temperature:0.6,max_tokens:maxTokens||800});
  return ((r.choices&&r.choices[0]&&r.choices[0].message&&r.choices[0].message.content)||'').trim();
}
async function webllmGenerateStream(messages,system,onChunk,maxTokens){
  const eng=await loadWebLLM();
  const stream=await eng.chat.completions.create({messages:_webllmMsgs(messages,system),stream:true,temperature:0.6,max_tokens:maxTokens||800});
  let full='';
  for await(const chunk of stream){
    const d=(chunk.choices&&chunk.choices[0]&&chunk.choices[0].delta&&chunk.choices[0].delta.content)||'';
    if(d){full+=d;onChunk(d);}
  }
  return full.trim();
}
// Only route through WebLLM when the model is already loaded & ready.
function webllmActive(){return localAIOn()&&webllmStatus==='ready'&&!!webllmEngine;}
/* ---------- API call (non-streaming) ---------- */
async function callClaude(messages,system,maxTokens=1000){
  if(webllmActive()){try{const r=await webllmGenerate(messages,system,maxTokens);if(r)return r;}catch(e){/* fall back to local */}}
  if(!aiConfigured())return localFromMessages(messages,system);
  const cfg=await aiRequestConfig();
  const body={model:AI_MODEL,max_tokens:maxTokens,messages};
  if(system)body.system=system;
  let res;
  try{res=await fetch(cfg.endpoint,{method:'POST',headers:cfg.headers,body:JSON.stringify(body)});}
  catch(e){throw new Error(friendlyAIError(e));}
  if(!res.ok){
    let detail='';try{detail=(await res.json()).error?.message||'';}catch(e){}
    throw new Error(friendlyAIError(new Error(detail||('HTTP '+res.status))));
  }
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}
/* ---------- API call (streaming via SSE) ---------- */
async function callClaudeStream(messages,system,onChunk,maxTokens=1000){
  if(webllmActive()){
    try{const r=await webllmGenerateStream(messages,system,onChunk,maxTokens);if(r)return r;}
    catch(e){/* fall back to local/remote below */}
  }
  if(!aiConfigured()){
    // Local engine: stream the on-device reply word-by-word so it feels live.
    const full=localFromMessages(messages,system);
    const words=full.split(/(\s+)/);
    for(let i=0;i<words.length;i++){
      onChunk(words[i]);
      if(i%3===0)await new Promise(r=>setTimeout(r,12));
    }
    return full;
  }
  const cfg=await aiRequestConfig();
  const body={model:AI_MODEL,max_tokens:maxTokens,stream:true,messages};
  if(system)body.system=system;
  let res;
  try{res=await fetch(cfg.endpoint,{method:'POST',headers:cfg.headers,body:JSON.stringify(body)});}
  catch(e){throw new Error(friendlyAIError(e));}
  if(!res.ok){
    let detail='';try{detail=(await res.json()).error?.message||'';}catch(e){}
    throw new Error(friendlyAIError(new Error(detail||('HTTP '+res.status))));
  }
  if(!res.body||!res.body.getReader){ // fallback: no stream support → one-shot
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    onChunk(text);return text;
  }
  const reader=res.body.getReader();const decoder=new TextDecoder();
  let buffer='',full='';
  for(;;){
    const{done,value}=await reader.read();if(done)break;
    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split('\n');buffer=lines.pop();
    for(const line of lines){
      const l=line.trim();
      if(!l.startsWith('data:'))continue;
      const data=l.slice(5).trim();
      if(data==='[DONE]')return full;
      try{
        const p=JSON.parse(data);
        if(p.type==='content_block_delta'&&p.delta&&p.delta.text){full+=p.delta.text;onChunk(p.delta.text);}
        if(p.type==='error')throw new Error(friendlyAIError(new Error(p.error&&p.error.message||'stream error')));
      }catch(err){if(err instanceof SyntaxError)continue;throw err;}
    }
  }
  return full;
}

function sparLogCard(l){

}
function delSparLog(id){S.sparLogs=(S.sparLogs||[]).filter(l=>l.id!==id);saveNow();rerenderAICoach();}
async function runSparBreakdown(){

<script>
/* ============================================================
   NUTRITION MODULE — meal planner, hydration, supplements
   ============================================================ */
let nutTab='food';
ROUTES.nutrition=function(){
  const tabs=[['food','Food Log'],['meals','Meal Planner'],['hydration','Hydration'],['supps','Supplements']];
  return`<div class="view-head"><div class="crumb">Fuel</div><h1>Nutrition</h1>
    <p>Eat for the phase you're in. Build, cut, or refeed — and stay hydrated through it all.</p></div>
    <div class="tabs">${tabs.map(([k,l])=>`<div class="tab ${nutTab===k?'active':''}" onclick="nutTab='${k}';go('nutrition')">${l}</div>`).join('')}</div>
    <div>${({food:nutFoodLog,meals:nutMeals,hydration:nutHydration,supps:nutSupps}[nutTab])()}</div>`;

/* ---------- FOOD LOG + MACRO TARGETS ---------- */
function macroTargets(){
  const kg=+S.profile.weight||70;
  const wk=Date.now()-7*864e5;
  const sess=S.sessions.filter(s=>s.ts>=wk);
  const weeklyLoad=sess.reduce((a,s)=>a+(s.duration||0)*(s.intensity||3),0);
  const act=weeklyLoad>900?1.725:weeklyLoad>500?1.55:weeklyLoad>200?1.375:1.2;
  const ht=+S.profile.height||178, age=+S.profile.age||27;
  const bmr=10*kg+6.25*ht-5*age+5; // Mifflin-St Jeor
  const tdee=Math.round(bmr*act);
  const phaseAdj={Build:400,Cut:-500,Refeed:150}[mealPhase]||0;
  const cal=Math.max(1400,tdee+phaseAdj);
  const protein=Math.round(kg*(mealPhase==='Cut'?2.4:2.2));
  const fat=Math.round(kg*(mealPhase==='Refeed'?0.6:0.9));
  const carbs=Math.max(0,Math.round((cal-protein*4-fat*9)/4));
  return{cal,protein,carbs,fat,tdee,act};
}
function dayFood(date){return (S.foodLog&&S.foodLog[date])?S.foodLog[date]:[];}
function dayTotals(date){
  return dayFood(date).reduce((a,f)=>({cal:a.cal+(+f.cal||0),protein:a.protein+(+f.protein||0),carbs:a.carbs+(+f.carbs||0),fat:a.fat+(+f.fat||0)}),{cal:0,protein:0,carbs:0,fat:0});
}
function nutFoodLog(){
  const t=todayISO();const T=macroTargets();const tot=dayTotals(t);const items=dayFood(t);
  const bar=(label,val,target,color,unit)=>{const pct=target?Math.min(100,Math.round(val/target*100)):0;const over=val>target*1.05;
    return`<div style="margin-bottom:11px"><div class="between fz11"><span class="muted">${label}</span><span class="mono ${over?'red':''}">${Math.round(val)} / ${target}${unit}</span></div>
      <div class="macro-track"><div class="macro-fill" style="width:${pct}%;background:${color};box-shadow:0 0 10px ${color}55"></div></div></div>`;};
  return`<div class="row wrap mb" style="gap:8px">${Object.keys(PHASES).map(p=>`<button class="btn ${mealPhase===p?'':'ghost'} sm" onclick="mealPhase='${p}';go('nutrition')">${p}</button>`).join('')}</div>
    <div class="grid" style="grid-template-columns:1fr 1fr;align-items:start;gap:16px">
      <div class="card pop-in">
        <div class="between mb"><div class="fw6">Today's Targets</div><span class="mono fz11 muted">${mealPhase} · TDEE ${T.tdee}</span></div>
        ${bar('Calories',tot.cal,T.cal,'var(--gold)','')}
        ${bar('Protein',tot.protein,T.protein,'var(--green)','g')}
        ${bar('Carbs',tot.carbs,T.carbs,'#5B8DEF','g')}
        ${bar('Fat',tot.fat,T.fat,'var(--red)','g')}
        <div class="fz11 muted mt">Targets derive from weight, height, age, recent training load and the selected phase. Set body metrics in Settings → Profile.</div>
      </div>
      <div class="card pop-in" style="animation-delay:.05s">
        <div class="fw6 mb">Quick Add</div>
        <label class="field"><span>Food</span><input class="inp" id="fdName" placeholder="e.g. Chicken & rice" onkeydown="if(event.key==='Enter')addFood()"></label>
        <div class="grid g2 keep">
          <label class="field"><span>Calories</span><input class="inp" type="number" inputmode="numeric" id="fdCal" placeholder="kcal"></label>
          <label class="field"><span>Protein (g)</span><input class="inp" type="number" inputmode="numeric" id="fdPro" placeholder="g"></label>
        </div>
        <div class="grid g2 keep">
          <label class="field"><span>Carbs (g)</span><input class="inp" type="number" inputmode="numeric" id="fdCarb" placeholder="g"></label>
          <label class="field"><span>Fat (g)</span><input class="inp" type="number" inputmode="numeric" id="fdFat" placeholder="g"></label>
        </div>
        <button class="btn block" onclick="addFood()">${icon('plus')} Add to today</button>
      </div>
    </div>
    <div class="card mt"><div class="between mb"><div class="fw6">Today's Food</div><span class="mono fz11 muted">${items.length} item${items.length===1?'':'s'}</span></div>
      ${items.length?items.map(f=>`<div class="between food-row" style="padding:9px 0;border-bottom:1px solid var(--line)">
        <div><span class="fw6 fz13">${esc(f.name)}</span><div class="mono fz11 muted">${Math.round(f.cal)}kcal · P${Math.round(f.protein)} C${Math.round(f.carbs)} F${Math.round(f.fat)}</div></div>
        <button class="x-btn" onclick="delFood('${f.id}')">${icon('trash')}</button></div>`).join(''):'<div class="empty fz12 muted">Nothing logged yet today.</div>'}
    </div>
    <div class="card mt"><div class="fw6 mb">7-Day Calorie Compliance</div>
      <canvas id="macroChart" width="640" height="180" style="width:100%;height:auto"></canvas>
      <div class="fz11 muted mt">Bars show daily calories vs target (dashed line). Green = within ±10% of target.</div></div>`;
}
function addFood(){
  const name=($('#fdName').value||'').trim();if(!name){toast('Name the food','red');return;}
  const f={id:uid(),name,cal:+$('#fdCal').value||0,protein:+$('#fdPro').value||0,carbs:+$('#fdCarb').value||0,fat:+$('#fdFat').value||0,ts:Date.now()};
  const t=todayISO();if(!S.foodLog)S.foodLog={};if(!S.foodLog[t])S.foodLog[t]=[];
  S.foodLog[t].push(f);save();logActivity('nutrition','Logged '+name);toast('Added '+name,'green');
  window._afterRender=drawMacroChart;go('nutrition');
}
function delFood(id){
  const t=todayISO();if(S.foodLog&&S.foodLog[t])S.foodLog[t]=S.foodLog[t].filter(f=>f.id!==id);save();
  window._afterRender=drawMacroChart;go('nutrition');
}
function drawMacroChart(){
  const cv=$('#macroChart');if(!cv)return;const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const T=macroTargets();const target=T.cal;
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  const vals=days.map(d=>dayTotals(d).cal);
  const max=Math.max(target*1.3,...vals)*1.05||3000;
  const gap=W/7,bw=gap*.5;
  days.forEach((d,i)=>{const v=vals[i];const h=v/max*(H-30);const x=i*gap+gap*.25;
    const within=Math.abs(v-target)<=target*0.1;
    ctx.fillStyle=v===0?'#333':within?'#3FB950':'#C8A84B';ctx.fillRect(x,H-20-h,bw,h);
    ctx.fillStyle='#888';ctx.font='9px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText(new Date(d).toLocaleDateString('en',{weekday:'short'})[0],x+bw/2,H-6);});
  const ty=H-20-target/max*(H-30);ctx.strokeStyle='#E63946';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();ctx.setLineDash([]);
}

/* ---------- MEAL PLANNER ---------- */
const PHASES={
  Build:{desc:'Caloric surplus, high protein — build the engine.',cal:'+300–500 kcal',
    macros:'2.2g/kg protein · 4–5g/kg carbs · 1g/kg fat',color:'var(--green)'},
  Cut:{desc:'Deficit while preserving muscle — make weight without losing power.',cal:'−400–600 kcal',
    macros:'2.4g/kg protein · 2–3g/kg carbs · 0.8g/kg fat',color:'var(--gold)'},
  Refeed:{desc:'Carb reload 48h pre-fight — top off glycogen, restore performance.',cal:'+200 kcal',
    macros:'2g/kg protein · 6–8g/kg carbs · 0.6g/kg fat',color:'var(--red)'}
};
let mealPhase='Cut',mealBusy=false,mealResult='';
function nutMeals(){
  const ph=PHASES[mealPhase];
  return`<div class="row wrap mb" style="gap:8px">${Object.keys(PHASES).map(p=>`<button class="btn ${mealPhase===p?'':'ghost'} sm" onclick="mealPhase='${p}';mealResult='';go('nutrition')">${p}</button>`).join('')}</div>
    <div class="card mb" style="border-top:2px solid ${ph.color}">
      <div class="between"><span class="display gold" style="font-size:26px">${mealPhase} Phase</span></div>
      <p class="muted fz12 mt">${ph.desc}</p>
      <div class="grid g3 keep mt">
        <div><div class="fz11 muted">CALORIES</div><div class="mono gold">${ph.cal}</div></div>
        <div style="grid-column:span 2"><div class="fz11 muted">MACRO TARGETS</div><div class="mono fz12">${ph.macros}</div></div>
      </div>
    </div>
    <div class="card mb"><div class="fw6 mb">Generate a personalised day</div>
      <div class="grid g2 keep">
        <label class="field"><span>Current weight (${wUnit()})</span><input class="inp" type="number" step="0.1" id="mealCur" value="${S.profile.weight?toDisplayW(S.profile.weight):''}"></label>
        <label class="field"><span>Target weight (${wUnit()})</span><input class="inp" type="number" step="0.1" id="mealTgt" value="${S.targetWeight?toDisplayW(S.targetWeight):''}"></label>
      </div>
      <div class="grid g2 keep">
        <label class="field"><span>Fight date</span><input class="inp" type="date" id="mealDate" value="${S.profile.nextEvent||''}"></label>
        <label class="field"><span>Dietary restriction</span><select class="inp" id="mealDiet"><option>none</option><option>vegetarian</option><option>halal</option><option>gluten-free</option></select></label>
      </div>
      <button class="btn block" onclick="genMealPlan()" ${mealBusy?'disabled':''}>${mealBusy?'Generating…':'Generate Meal Plan'}</button>
    </div>
    ${apiKeyMissingNote()}
    <div id="mealResult">${mealBusy?'<div class="empty"><span class="typing"><i></i><i></i><i></i></span></div><style>.typing i{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin:0 2px;animation:tp 1.2s infinite}.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}@keyframes tp{0%,60%,100%{opacity:.3}30%{opacity:1}}</style>':mealResult?`<div class="card">${md(mealResult)}</div>`:''}</div>`;
}
async function genMealPlan(){
  /* coach runs on-device — no key required */
  const cur=$('#mealCur').value,tgt=$('#mealTgt').value,diet=$('#mealDiet').value,date=$('#mealDate').value;
  mealBusy=true;go('nutrition');

  const content=`Phase: ${mealPhase}. Current weight: ${cur||'?'}${wUnit()}, target: ${tgt||'?'}${wUnit()}, fight date: ${date||'unset'}, dietary restriction: ${diet}.`;

/* ---------- HYDRATION TRACKER ---------- */
function nutHydration(){
  const today=todayISO();const ml=S.hydration[today]||0;
  const target=hydrationTarget();const pct=Math.min(100,Math.round(ml/target*100));
  const cutMode=S.cutPlan&&daysUntil(S.profile.nextEvent)<=5&&daysUntil(S.profile.nextEvent)>=0;
  return`<div class="section-title">Hydration<span class="ln"></span></div>
    <div class="grid" style="grid-template-columns:240px 1fr;align-items:start">
      <div class="card tac">
        <div style="position:relative;width:140px;height:200px;margin:0 auto;border:2px solid var(--line);border-radius:0 0 16px 16px;overflow:hidden">
          <div style="position:absolute;bottom:0;left:0;right:0;height:${pct}%;background:linear-gradient(180deg,var(--gold),#9d8238);transition:height .4s"></div>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;mix-blend-mode:difference;color:#fff">
            <div class="display" style="font-size:34px">${pct}%</div></div>
        </div>
        <div class="mono mt">${(ml/1000).toFixed(2)}L / ${(target/1000).toFixed(2)}L</div>
        <div class="row mt" style="gap:8px;justify-content:center">
          <button class="btn" onclick="addWater(250)">+250ml</button>
          <button class="btn ghost sm" onclick="addWater(-250)">−250ml</button>
        </div>
      </div>
      <div>
        <div class="card mb"><div class="fw6 mb">Today's target</div>
          <div class="mono gold" style="font-size:24px">${(target/1000).toFixed(2)} L</div>
          <div class="fz12 muted mt">Based on ${S.profile.weight?toDisplayW(S.profile.weight)+wUnit():'your bodyweight'} + today's training load.</div></div>
        ${cutMode?`<div class="banner gold"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v6M12 22v-6M2 12h6M22 12h-6"/></svg>
          <div><b>Cut week — electrolytes matter.</b> Add sodium, potassium and magnesium during water loading. Taper water in the final 24–36h per your cut plan, not your thirst.</div></div>`:''}
        <div class="card"><div class="fw6 mb">7-Day Intake</div>
          <canvas id="hydChart" width="600" height="160" style="width:100%;height:auto"></canvas></div>
      </div>
    </div>`;
}
function hydrationTarget(){
  const kg=S.profile.weight||70;let base=kg*40; // 40ml/kg base
  const todaySessions=S.sessions.filter(s=>s.date===todayISO());
  const load=todaySessions.reduce((a,s)=>a+s.duration*s.intensity,0);
  return Math.round(base+load*2);
}
function addWater(ml){
  const t=todayISO();S.hydration[t]=Math.max(0,(S.hydration[t]||0)+ml);save();
  window._afterRender=drawHydChart;go('nutrition');
}
function drawHydChart(){
  const cv=$('#hydChart');if(!cv)return;const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  const target=hydrationTarget();const max=Math.max(target,...days.map(d=>S.hydration[d]||0))*1.1||3000;
  const bw=W/7*.55,gap=W/7;
  days.forEach((d,i)=>{const v=S.hydration[d]||0;const h=v/max*(H-30);const x=i*gap+gap*.22;
    ctx.fillStyle=v>=target?'#3FB950':'#C8A84B';ctx.fillRect(x,H-20-h,bw,h);
    ctx.fillStyle='#888';ctx.font='9px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText(new Date(d).toLocaleDateString('en',{weekday:'short'})[0],x+bw/2,H-6);});
  // target line
  const ty=H-20-target/max*(H-30);ctx.strokeStyle='#E63946';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();ctx.setLineDash([]);
}

/* ---------- SUPPLEMENT SCHEDULER ---------- */
const SUPP_TIMING=['morning','pre-workout','post-workout','with meals','night'];
function nutSupps(){
  const today=todayISO();const taken=S.supplementLog[today]||[];
  return`<div class="between mb"><div class="section-title" style="margin:0">Supplements<span class="ln" style="width:40px"></span></div>
    <button class="btn" onclick="openSuppModal()">${icon('plus')} Add Supplement</button></div>
    ${S.supplements.length?`<div class="card mb"><div class="fw6 mb">Today's Checklist</div>
      ${SUPP_TIMING.map(t=>{const items=S.supplements.filter(s=>s.timing===t);if(!items.length)return'';
        return`<div class="fz11 muted mt" style="text-transform:uppercase;letter-spacing:.08em">${t}</div>

let breathTimer=null;
function startBreathing(){
  let phase=0;const phases=[['Breathe in',4,1.4],['Hold',7,1.4],['Breathe out',8,0.7]];
  function render(p,scale,label){
    $('#modalRoot').innerHTML=`<div class="modal-bg" style="background:#000;flex-direction:column">

<script>
/* ============================ MENTAL: JOURNAL ============================ */

}
function pickRate(group,v){$$('#'+group+' .rate-dot').forEach(d=>d.classList.toggle('sel',+d.dataset.v===v));$('#'+group).dataset.val=v;}
function saveJournal(){
  const moodEl=$('#jMood');const mood=+(moodEl.dataset.val||3);
  const conf=+$('#jConf').value;const notes=$('#jNotes').value.trim();
  S.journal.push({id:uid(),date:todayISO(),mood,conf,notes});

  window._afterRender=drawMoodChart;go('mental');
}
function delJournal(id){S.journal=S.journal.filter(e=>e.id!==id);save();window._afterRender=drawMoodChart;go('mental');}
function drawMoodChart(){
  const c=$('#moodChart');if(!c)return;const ctx=c.getContext('2d');
  const w=c.width=c.offsetWidth,h=c.height;ctx.clearRect(0,0,w,h);
  const data=S.journal.slice(-14);if(data.length<2)return;
  const pad=24;const xs=(w-pad*2)/(data.length-1);
  function line(key,max,color){
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
    data.forEach((d,i)=>{const x=pad+i*xs;const y=h-pad-((d[key]-1)/(max-1))*(h-pad*2);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke();
    data.forEach((d,i)=>{const x=pad+i*xs;const y=h-pad-((d[key]-1)/(max-1))*(h-pad*2);ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,3,0,7);ctx.fill();});
  }
  line('mood',5,'#C8A84B');line('conf',10,'#3FB950');
  ctx.font='10px JetBrains Mono';ctx.fillStyle='#888';
  ctx.fillText('● mood',pad,12);ctx.fillStyle='#3FB950';ctx.fillText('● confidence',pad+58,12);
}
async function runJournalReflection(){

}

/* ============================ MENTAL: HABITS ============================ */
function habitStreak(id){
  let streak=0;const log=S.habitLog[id]||{};
  for(let i=0;i<400;i++){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);
    if(log[k])streak++;else if(i>0)break;else if(!log[k]&&i===0)continue;}
  return streak;
}
function habitDone(id,dateK){return !!(S.habitLog[id]&&S.habitLog[id][dateK]);}
function toggleHabit(id,dateK){
  S.habitLog[id]=S.habitLog[id]||{};
  if(S.habitLog[id][dateK])delete S.habitLog[id][dateK];else{S.habitLog[id][dateK]=1;logActivity('mental','Habit done: '+(S.habits.find(h=>h.id===id)||{}).name);}
  save();go('mental');
}
function mentalHabits(){
  const today=todayISO();
  return `<div class="card">
    <div class="row-between mb"><div class="fw6">Daily Disciplines</div>
      <button class="btn sm" onclick="addHabit()">+ Add Habit</button></div>

    <div class="habit-list">
    ${S.habits.map(h=>{const st=habitStreak(h.id);const done=habitDone(h.id,today);
      return `<div class="habit-row">
        <button class="habit-check ${done?'on':''}" onclick="toggleHabit('${h.id}','${today}')">${done?'✓':''}</button>

        <button class="ic-btn" onclick="delHabit('${h.id}')">${icon('trash')}</button>
      </div>`;}).join('')}
    </div>
  </div>`;
}
function habitGrid(id){
  let cells='';
  for(let i=48;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);
    const on=habitDone(id,k);cells+=`<i class="hcell ${on?'on':''}" title="${k}"></i>`;}
  return `<div class="habit-grid">${cells}</div>`;

function currentCampWeek(){
  if(!S.campPlan||!S.campPlan.fightDate)return null;
  const total=S.campPlan.weeks.length;
  const dleft=daysUntil(S.campPlan.fightDate);

  const wk=total-Math.ceil(dleft/7);
  return clamp(wk,0,total-1);
}

  if(!S.campPlan)return `<div class="card">

  const cur=currentCampWeek();

    <div class="row-between mb">
      <div><div class="fw6">Camp to ${fmtDate(S.campPlan.fightDate)}</div>

function generateCamp(){
  const date=$('#campDate').value;if(!date)return toast('Pick a fight date','red');
  const len=+$('#campLen').value;
  const tmpl=[
    {phase:'General Prep',focus:'Build engine — volume, strength base, technical volume',intensity:'Vol 70%'},
    {phase:'General Prep',focus:'Conditioning ramp, drilling fundamentals, spar light',intensity:'Vol 75%'},
    {phase:'Specific Prep',focus:'Opponent style drilling, hard sparring intro',intensity:'Vol 85%'},
    {phase:'Specific Prep',focus:'Game-plan sparring, situational rounds',intensity:'Vol 90%'},
    {phase:'Peak',focus:'Fight-pace sparring, sharpen weapons',intensity:'Vol 95%'},
    {phase:'Peak',focus:'Hardest week — full rounds, mental rehearsal',intensity:'Vol 100%'},
    {phase:'Taper',focus:'Volume drops, speed & timing, weight on track',intensity:'Vol 60%'},
    {phase:'Fight Week',focus:'Light movement, visualisation, make weight, rest',intensity:'Vol 30%'}
  ];
  let weeks;
  if(len===8)weeks=tmpl;
  else if(len===6)weeks=[tmpl[1],tmpl[2],tmpl[3],tmpl[5],tmpl[6],tmpl[7]];
  else{weeks=[...tmpl];const extra=len-8;for(let i=0;i<extra;i++)weeks.splice(1,0,{phase:'General Prep',focus:'Base building — engine & strength',intensity:'Vol 70%'});}
  S.campPlan={fightDate:date,weeks};save();logActivity('mental','Generated '+len+'-week camp');toast('Camp built','green');go('mental');
}
function resetCamp(){confirmModal('Reset Camp','This clears your current camp plan.',()=>{S.campPlan=null;save();go('mental');});}

/* ============================================================
   REAL-WORLD BOOKING ACTIONS — calendar (.ics), email & SMS
   Works on any device, no server or API key. Bookings become a
   downloadable calendar invite and pre-filled email / text.
   ============================================================ */
let _lastEvent=null;
function _p2(n){return String(n).padStart(2,'0');}
function _icsStamp(){return new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');}
function _icsLocal(date,time){return (date||todayISO()).replace(/-/g,'')+'T'+((time||'18:00').replace(':',''))+'00';}
function _icsEnd(date,time,min){const d=new Date((date||todayISO())+'T'+(time||'18:00')+':00');d.setMinutes(d.getMinutes()+(min||90));return ''+d.getFullYear()+_p2(d.getMonth()+1)+_p2(d.getDate())+'T'+_p2(d.getHours())+_p2(d.getMinutes())+'00';}
function _icsEsc(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');}
function makeICS(o){return['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Octagon//Training//EN','CALSCALE:GREGORIAN','BEGIN:VEVENT','UID:'+uid()+'@octagon','DTSTAMP:'+_icsStamp(),'DTSTART:'+_icsLocal(o.date,o.time),'DTEND:'+_icsEnd(o.date,o.time,o.dur),'SUMMARY:'+_icsEsc(o.title),'LOCATION:'+_icsEsc(o.location),'DESCRIPTION:'+_icsEsc(o.desc),'BEGIN:VALARM','TRIGGER:-PT2H','ACTION:DISPLAY','DESCRIPTION:'+_icsEsc(o.title),'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');}
function downloadBlob(name,content,mime){try{const b=new Blob([content],{type:mime||'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),4000);return true;}catch(e){return false;}}
function calLast(){if(!_lastEvent)return;const ok=downloadBlob((_lastEvent.title||'session').replace(/[^a-z0-9]+/gi,'_').slice(0,40)+'.ics',makeICS(_lastEvent),'text/calendar');toast(ok?'Calendar invite saved — open it to add the event':'Could not create the file',ok?'green':'red');}
function _eventOf(b){const when=b.date+(b.time?(' '+b.time):'');return{title:'Training — '+b.focus,date:b.date,time:b.time||'18:00',dur:90,location:b.loc||'',desc:'Octagon training session.\nFocus: '+b.focus+'\nWith: '+(b.withName||'')+'\nLocation: '+(b.loc||'')+'\nWhen: '+when};}

   Seed profiles are sample data, so each gets a stable, clearly

function _slug(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'');}
function _hash(s){let h=2166136261;s=String(s||'');for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function _demoPhone(seed){const h=_hash('ph'+seed);const pre=['50','52','54','55','56','58'][h%6];const seven=String(2000000+(h%7000000)).slice(0,7);return '+971'+pre+seven;}
function _demoEmail(ent){
  const isVenue=ent&&ent.id&&ent.id[0]==='g';
  const dom=(_slug(isVenue?ent.name:ent.gym)||'octagongym')+'.ae';
  if(isVenue)return 'info@'+dom;
  const parts=String(ent.name||'').trim().split(/\s+/).map(_slug).filter(w=>w&&!['coach','kru','professor','prof','sensei'].includes(w));
  const local=parts.length>=2?parts[0]+'.'+parts[parts.length-1]:(parts[0]||'fighter');

/* ============================================================================
   ARTICULATED TECHNIQUE FIGURES — true joint motion via inline SMIL.
   Each limb is a 3-point path (shoulder/hip → elbow/knee → hand/foot) that we
   morph between keyframes with <animate attributeName="d">. The whole body can
   additionally translate/rotate via <animateTransform>. Orthodox stance, the
   fighter faces right; the opponent stands on the right.
   ============================================================================ */
const KT='0;0.2;0.38;1';            // default strike timing: snap out, brief peak, recover
const EASE='.15 .8 .3 1;.4 .05 .55 1;.5 0 .55 1';   // 3 segments (4 keyframes)
const EASE_SMOOTH='.45 0 .55 1;.45 0 .55 1;.45 0 .55 1';
// guard-stance joints
const J={
  head:[70,42],
  gLA:[[73,59],[80,54],[86,49]],    // lead arm  (jab side, nearer opponent)
  gRA:[[66,59],[72,55],[78,50]],    // rear arm  (power side)
  gLL:[[74,90],[83,112],[90,134]],  // lead leg  (front)
  gRL:[[66,90],[60,112],[54,134]]   // rear leg  (back)
};
function _lp(p){return `M${p[0][0]},${p[0][1]} L${p[1][0]},${p[1][1]} L${p[2][0]},${p[2][1]}`;}
function _aPath(cls,frames,dur,kt,spl){
  const v=frames.map(_lp).join(';');
  return `<path class="${cls}" d="${_lp(frames[0])}"><animate attributeName="d" dur="${dur}s" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" values="${v}" keySplines="${spl}"/></path>`;
}
function _aCirc(cls,pts,r,dur,kt,spl){
  const cx=pts.map(p=>p[0]).join(';'),cy=pts.map(p=>p[1]).join(';');
  return `<circle class="${cls}" r="${r}" cx="${pts[0][0]}" cy="${pts[0][1]}">`+
    `<animate attributeName="cx" dur="${dur}s" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" values="${cx}" keySplines="${spl}"/>`+
    `<animate attributeName="cy" dur="${dur}s" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" values="${cy}" keySplines="${spl}"/></circle>`;
}
function _aFoot(frames,dur,kt,spl){
  const cx=frames.map(f=>f[2][0]).join(';'),cy=frames.map(f=>f[2][1]).join(';');
  return `<ellipse class="f-foot-c" rx="6" ry="2.6" cx="${frames[0][2][0]}" cy="${frames[0][2][1]}">`+
    `<animate attributeName="cx" dur="${dur}s" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" values="${cx}" keySplines="${spl}"/>`+
    `<animate attributeName="cy" dur="${dur}s" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" values="${cy}" keySplines="${spl}"/></ellipse>`;
}
function _sPath(cls,p){return `<path class="${cls}" d="${_lp(p)}"/>`;}
/* Render a standing fighter. pose: {leadArm,rearArm,leadLeg,rearLeg} each an
   array of 3-point frames (or omitted = hold guard); plus body trans/rot. */
function standFighter(pose){
  pose=pose||{};
  const d=pose.dur||1.5,kt=pose.kt||KT,sp=pose.ease||EASE;
  const arm=(cls,fr,g)=> fr
    ? _aPath('f-limb '+cls,fr,d,kt,sp)+_aCirc('f-glove',fr.map(f=>f[2]),6,d,kt,sp)
    : _sPath('f-limb '+cls,g)+`<circle class="f-glove" cx="${g[2][0]}" cy="${g[2][1]}" r="6"/>`;
  const leg=(cls,fr,g)=> fr
    ? _aPath('f-limb f-shin '+cls,fr,d,kt,sp)+_aFoot(fr,d,kt,sp)
    : _sPath('f-limb f-shin '+cls,g)+`<ellipse class="f-foot-c" cx="${g[2][0]}" cy="${g[2][1]}" rx="6" ry="2.6"/>`;
  const inner=
    leg('',pose.rearLeg,J.gRL)+
    arm('',pose.rearArm,J.gRA)+
    leg('',pose.leadLeg,J.gLL)+
    `<path class="f-hip" d="M64,89 L76,89 L75,97 L65,97 Z"/>`+
    `<path class="f-torso" d="M63,58 C61,71 63,84 66,92 L74,92 C77,84 79,71 77,58 C74,54 66,54 63,58 Z"/>`+
    `<g class="f-head"><circle class="f-skull" cx="70" cy="42" r="11"/><path class="f-face" d="M76,39 L80,41 M73,45 L77,46"/></g>`+
    arm('',pose.leadArm,J.gLA);
  let anims='';
  if(pose.trans) anims+=`<animateTransform attributeName="transform" type="translate" additive="sum" dur="${d}s" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" values="${pose.trans}" keySplines="${sp}"/>`;
  if(pose.rot)   anims+=`<animateTransform attributeName="transform" type="rotate" additive="sum" dur="${d}s" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" values="${pose.rot}" keySplines="${sp}"/>`;
  return `<g class="fbody">${anims}${inner}</g>`;
}

function demoTech(it){

}
