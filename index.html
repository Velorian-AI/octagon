   signature:`The oblique (side) kick to the lead knee — it stops forward pressure cold, damages the joint over a fight, and keeps you pinned at the end of his enormous reach.`,
   keys:[`Uses his reach advantage with a long lead-hand frame in the opponent's face to deny entry.`,
     `Oblique kicks and side kicks attack the knee and thigh to dismantle footwork and pressure.`,
     `Mixes 8 points of contact — elbows, spinning attacks, knees in the clinch — so there's no single read.`,
     `Wrestling threat is always live; the strike fear opens the takedown and vice-versa.`],
   setup:`He stifles your pressure with the oblique kick and stiff-arm frame, banks damage on the lead leg, then once you hesitate to step in he closes to elbows or changes levels for the takedown. Every option sets up the next.`,
   why:`Controlling range plus controlling where the fight happens (standing vs. ground) means the opponent never gets to fight their fight. Jones removes options until only his are left.`,
   counter:`He has historically been most tested early by explosive pressure and feints before he settles in and starts solving the puzzle; the oblique-kick-heavy style is also physically punishing to throw for five rounds.`,
   drill:[`Drill the side/oblique kick as a stop-hit: as your partner steps in, extend the kick to the lead thigh/knee to halt them.`,
     `Practise the long-guard frame — stiff lead arm to the forehead — to control distance in the clinch.`,
     `Flow between a strike entry and a level change on the same step so the takedown hides inside the striking.`],
   iq:`Jones rarely fights the same way twice — he game-plans the specific opponent and is willing to win ugly. Adaptability over a signature look is itself the signature.`,
   stat:`Won UFC light-heavyweight title at 23 and went undefeated across the division for over a decade.`,
   url:_yt('jon jones fight iq breakdown')},

  {fighter:'Conor McGregor',nick:'The Notorious',tag:'Striking',title:'The southpaw left & distance timing',
   record:'22-6 (MMA)',stance:'Southpaw',division:'Featherweight / Lightweight',era:'2013–2018 (peak)',
   desc:`At his peak, McGregor's left straight was the most feared single shot in MMA. His genius was timing — he threw it as opponents stepped in, turning their own forward motion into the power source.`,
   signature:`The pull-counter left straight: hands carried low, head slightly back, he draws the lead, leans just off it and fires the rear hand down the open southpaw-vs-orthodox centreline.`,
   keys:[`Southpaw stance gives a clear lane for the rear straight against orthodox fighters — outside foot position is everything.`,
     `Fights with hands low to bait and to relax the shoulders for a faster, longer left.`,
     `Times the shot on the opponent's step-in, not on his own initiation — borrowed momentum.`,
     `Front-kick and side-kick to the body manage distance and keep the lead lane clear.`],
   setup:`He establishes the threat of the left early so opponents become tentative; that hesitation is when he steps the lead foot outside and lands the counter as they reach. He sells distance as safe, then collapses it.`,
   why:`The straight rear hand travels the shortest path to the chin, and thrown as a counter it lands before the opponent's guard returns. Against an orthodox fighter, the southpaw angle keeps it on a lane they can't easily parry.`,
   counter:`Leg kicks to the lead leg erode the stance the left is built on; a high pace into deep waters historically dropped his output, and wrestlers who weather round one change the math.`,
   drill:[`Drill the outside-foot battle: against an orthodox partner, win lead-foot-outside position before throwing.`,
     `Pull-counter reps: partner jabs, you lean off the line and answer with the rear straight in the same beat.`,
     `Shadowbox carrying the rear hand 'loaded' so the left is always a half-beat from launching.`],
   iq:`McGregor showed that one elite, deeply-trusted weapon — set up with feints, timing and a believable threat — can define an entire division if the opponent has to respect it every second.`,
   stat:`First fighter to hold two UFC titles simultaneously; many of his finishes traced back to the same left hand.`,
   url:_yt('conor mcgregor left hand breakdown')},

  {fighter:'Max Holloway',nick:'Blessed',tag:'Striking',title:'Volume boxing & pocket pressure',
   record:'26-8 (MMA)',stance:'Orthodox',division:'Featherweight',era:'2016–present',
   desc:`Holloway drowns opponents in volume and rhythm. He plants in the pocket, talks to you, and throws long, accurate combinations that compound round over round until the dam breaks.`,
   signature:`The relentless 3-to-6-punch combinations thrown while standing in range — he's comfortable being hit to land three back, and the math always favours him.`,
   keys:[`High output with real accuracy — not arm-punches; he turns the shots over with the hips.`,
     `Stays in a stable, square-ish stance that lets him punch in long strings without resetting.`,
     `Mixes levels — body, body, head — to lower the guard before the head shots land.`,
     `Excellent chin and recovery let him fight in the pocket where his volume wins exchanges.`],
   setup:`He uses early rounds to establish rhythm and read your timing, then increases pace as you fatigue. The pressure is cumulative — he wants the later rounds, where his cardio and volume break you.`,
   why:`Volume plus accuracy is a numbers game: if you both land but he lands twice as often, he wins every exchange on points and eventually on damage. Sustained pressure also drains the opponent's legs, shrinking their defence.`,
   counter:`Elite movement and range strikers (peak Volkanovski) who refuse the pocket and pot-shot on the way out can out-point him; his hittable, stand-and-bang style means he does take damage.`,
   drill:[`Bag rounds with a minimum-punch rule per combination (3+) to build the habit of stringing shots.`,
     `Body-head level-change combos: two to the body, then up top, every set.`,
     `Cardio-volume rounds — keep a high, steady output for the full round to train pocket endurance.`],
   iq:`Holloway proved that conditioning is a skill: if you can throw clean combinations in round five the way you did in round one, you don't need a one-shot weapon — you are the pressure.`,
   stat:`Holds the UFC record for significant strikes landed, built almost entirely on volume in the pocket.`,
   url:_yt('max holloway volume boxing breakdown')},

  {fighter:'José Aldo',nick:'Junior',tag:'Muay Thai',title:'Leg kicks & takedown defence',
   record:'31-8 (MMA)',stance:'Orthodox',division:'Featherweight',era:'2009–2015 (peak)',
   desc:`Aldo's low kicks were so damaging they ended fights and careers, and his takedown defence let him stay standing to throw them. A complete Muay Thai base bolted onto elite MMA timing.`,
   signature:`The chopping low kick to the outside of the thigh — full hip rotation, shin turned over, thrown in volume until the opponent's lead leg stops working.`,
   keys:[`Rotates the whole hip and turns the shin over the target — it's a baseball-bat swing, not a flick.`,
     `Disguises the kick behind hand feints and punches so it lands clean and unchecked.`,
     `Elite takedown defence (sprawl, underhooks, hip control) keeps the fight where his kicks rule.`,
     `Explosive, short bursts conserve energy between phases of damage.`],
   setup:`He threatens the hands to draw the guard up and the weight forward, then takes the lead leg out from under a distracted opponent. Once the leg is compromised, everything else opens.`,
   why:`Leg kicks attack the foundation — a damaged lead leg destroys footwork, power and the ability to shoot a takedown. It's cumulative damage the opponent can't fully defend without surrendering their offence.`,
   counter:`Checking the kicks turns the damage back on the kicker; a relentless pace into the later rounds historically lowered his volume, and pressure that forces him backward limits the hip turn his kicks need.`,
   drill:[`Bag work: throw the low kick with full hip rotation and turn the shin over — quality of rotation over quantity.`,
     `Set up the kick behind a jab-cross so the legs are never the first thing you show.`,
     `Sprawl-and-return drill: defend a shot, then immediately fire the low kick as they stand back up.`],
   iq:`Aldo showed that you win by making the opponent's body fail before their will does — take the legs and you've taken the fight, no highlight knockout required.`,
   stat:`Reigned as featherweight champion (WEC + UFC) for roughly seven years, largely on the back of leg kicks and takedown defence.`,
   url:_yt('jose aldo leg kicks breakdown')},

  {fighter:'Vasyl Lomachenko',nick:'Hi-Tech',tag:'Boxing',title:'Angles & foot placement',
   record:'17-3 (boxing) · 396-1 (amateur)',stance:'Southpaw',division:'Lightweight (boxing)',era:'2014–present',
   desc:`Lomachenko's footwork is a science. He steps to the blind angle so consistently that opponents spend the fight turning to find a man who's already hitting them — boxing as a geometry problem.`,
   signature:`The pivot-step to the lead-foot-outside angle: he plants outside your lead foot, you're now square to him while he's at 45 degrees, and you literally cannot defend the lane he's punching down.`,
   keys:[`Constant small foot adjustments to win outside-foot position before he punches.`,
     `Pivots after combinations to a new angle instead of resetting straight back — he never leaves the way he came.`,
     `Body attack to pin the opponent's feet, then steps off to the angle they can't follow.`,
     `Layered feints (hands, head, feet) freeze the opponent's feet so he can step around them.`],
   setup:`He attacks the body to root your feet in place, then pivots to your blind side while you're stuck. By the time you re-square, he's landed and moved again — you're always a half-step behind the geometry.`,
   why:`If you can stand where your opponent can hit but can't be hit (off their centreline, outside their lead foot), you win every exchange for free. Angles convert equal exchanges into one-sided ones.`,
   counter:`Bigger, stronger fighters who can physically hold the centre and out-muscle the foot battle (as a couple of larger opponents managed) blunt the angle game; pure punchers who land in the brief moment he resets can interrupt the dance.`,
   drill:[`Pivot-after-combo drill: every combination ends with a pivot step to a new angle, never a straight retreat.`,
     `Outside-foot game vs. a partner — score a point only when you land from outside their lead foot.`,
     `Body-then-angle: dig to the body to pin them, immediately step off-line and fire from the new angle.`],
   iq:`Lomachenko makes opponents quit by erasing their offence entirely — when you can't even find your man to hit him, the fight breaks your spirit before your body.`,
   stat:`Won world titles in three weight classes in only his seventh, twelfth and thirteenth-ish pro fights — among the fastest ever.`,
   url:_yt('lomachenko footwork angles breakdown')},

  {fighter:'Floyd Mayweather',nick:'Money',tag:'Boxing',title:'Shoulder roll & defensive mastery',
   record:'50-0 (boxing)',stance:'Orthodox',division:'Welterweight (multi)',era:'1996–2017',
   desc:`The most refined defensive boxer of his generation. The Philly-shell shoulder roll let Mayweather make world-class punchers miss all night, then counter with a perfect, economical right hand.`,
   signature:`The shoulder-roll into the check-hook / rear-cross counter: lead shoulder up deflects the cross, right hand parries the jab, and the return fires through the gap the opponent just opened.`,
   keys:[`Lead shoulder raised to deflect the rear hand; rear glove guards the chin; lead arm protects the body.`,
     `Rolls with shots rather than blocking flush — he takes the angle off the punch so it slides by.`,
     `Counters with the short rear cross and the check hook the instant the opponent commits.`,
     `Ring generalship and pace control — he dictates tempo so exchanges happen on his terms.`],
   setup:`He invites you to lead (the shell looks open), absorbs or deflects it, and answers in the gap. The defence is the bait — every punch you throw at the shell is a punch he's already planning to counter.`,
   why:`A fighter who can't be hit cleanly can't lose on damage, and a perfect counter off a deflection lands while the opponent is fully committed and defensively open. Low risk, high return, sustained for twelve rounds.`,
   counter:`Sustained body pressure and high volume (the shell defends the head better than the body) is the classic blueprint; awkward, unpredictable rhythm bothers a fighter who reads patterns.`,
   drill:[`Shell-and-roll drill: partner throws the cross, you raise the lead shoulder and roll so it slides off.`,
     `Counter off the roll — after deflecting, fire the short rear hand immediately into the gap.`,
     `Tempo rounds: practise speeding up and slowing the pace deliberately to own the fight's rhythm.`],
   iq:`Mayweather treated boxing as risk management — minimise what you take, guarantee a clean counter, and let the rounds bank. Unbeaten over fifty fights is a defensive philosophy, not luck.`,
   stat:`Retired 50-0 across five weight classes, repeatedly out-boxing bigger punchers without absorbing damage.`,
   url:_yt('mayweather shoulder roll defense breakdown')},

  {fighter:'Mike Tyson',nick:'Iron Mike',tag:'Boxing',title:'Peek-a-boo & explosive entries',
   record:'50-6 (boxing)',stance:'Orthodox',division:'Heavyweight',era:'1985–1990 (peak)',
   desc:`Peak Tyson combined head movement, hand speed and terrifying power in a short heavyweight frame. He slipped into range behind constant upper-body movement and detonated hooks and uppercuts from angles bigger men couldn't see coming.`,
   signature:`The slip-to-uppercut/hook in the pocket: he weaves under the jab, loads the rear leg, and comes up with the short uppercut or rips the lead hook to the body and head in one motion.`,
   keys:[`Constant head movement on the entry — he closes distance while making himself hard to hit.`,
     `Stays low and coiled so every slip loads a leg for a power shot.`,
     `Throws short, fast hooks and uppercuts from the pocket where his lack of height becomes an advantage.`,
     `Bobs to the body then up to the head — the level change blinds the guard.`],
   setup:`He uses lateral and downward head movement to get past the longer reach of heavyweights, then unloads the instant he's inside. The whole game is built on safely crossing the gap, because once he's in, the power decides it.`,
   why:`A shorter fighter who can get inside without being hit on the way in nullifies reach and lands power from angles taller fighters aren't structured to defend. Head movement is the toll for entering; the power is the payoff.`,
   counter:`A long, busy jab and lateral movement that won't let him set his feet (the blueprint that troubled him later) keep him outside, where his height is a disadvantage and his entries stall.`,
   drill:[`Slip-line drill: weave under a rope or partner's jab and come up loading the rear leg for the uppercut.`,
     `Body-head hook combos from a low stance — short, turned-over, not reaching.`,
     `Entry practice: cross distance behind two head movements before throwing, so you never enter square and still.`],
   iq:`Tyson showed that aggression works when it's organised — the menace was real, but the head movement and angles underneath it were textbook, not wild.`,
   stat:`Became the youngest heavyweight champion in history at 20, finishing most early opponents inside the distance.`,
   url:_yt('mike tyson peek a boo head movement breakdown')},

  {fighter:'Canelo Álvarez',nick:'Canelo',tag:'Boxing',title:'Body punching & counter hooks',
   record:'62-2-2 (boxing)',stance:'Orthodox',division:'Super Middleweight (multi)',era:'2011–present',
   desc:`Canelo blends elite defence with the best body attack in boxing. He slips, rolls and counters like a defensive specialist, then invests in the body until opponents fold late.`,
   signature:`The slip-into-left-hook-to-the-body: he rolls under the cross and digs the hook to the liver/floating ribs, a shot that pays off three rounds later when the opponent's legs and breathing go.`,
   keys:[`Excellent upper-body defence — he rolls and slips in the pocket without giving up his position.`,
     `Relentless, accurate body investment that compounds over the fight.`,
     `Counter hooks and the short right hand off defensive movement.`,
     `Patient, measured pressure — he walks you down without lunging.`],
   setup:`He banks body shots early when you're fresh and don't feel them, then collects the debt in the championship rounds as your guard drops and your output falls. The early body work looks unremarkable until it isn't.`,
   why:`Body shots are an investment with delayed, irreversible returns — you can't 'recover' a fatigued body the way you shake off a head shot. Pair that with defence that keeps him fresh, and the late-fight gap only widens.`,
   counter:`Movement and a long jab from a skilled boxer who refuses to plant in front of him (as a couple of slick opponents managed) denies the counters; sheer size has occasionally out-physicaled him.`,
   drill:[`Roll-and-rip: slip the cross, immediately dig the lead hook to the body, then reset.`,
     `Body-investment rounds — target the liver and floating ribs with turned-over hooks, not slaps.`,
     `Patience walk-down drill: pressure a moving partner without lunging, cutting the ring instead.`],
   iq:`Canelo embodies fighting smart over fighting hard — defence keeps him fresh, body work breaks the other man, and the scorecards take care of themselves.`,
   stat:`Became undisputed super-middleweight champion, unifying all four belts in the division.`,
   url:_yt('canelo body punching defense breakdown')},

  {fighter:'Muhammad Ali',nick:'The Greatest',tag:'Boxing',title:'Footwork, jab & ring generalship',
   record:'56-5 (boxing)',stance:'Orthodox',division:'Heavyweight',era:'1964–1974 (peak)',
   desc:`Ali fought like a much smaller man in a heavyweight body — on his toes, circling, flicking a fast jab and refusing to be cornered. He redefined what mobility and rhythm could do at the top weight.`,
   signature:`The stick-and-move jab on the retreat: he pumps the long, fast jab while gliding backward and laterally, scoring and resetting before the opponent can plant to counter.`,
   keys:[`Lives on his toes with constant lateral movement — he's a moving target all night.`,
     `Fast, long jab used to score and to keep range, not just to set up power.`,
     `Pulls straight back off shots (unorthodox, but his reflexes made it work) to stay out of range.`,
     `Controls the ring — dictates where the fight happens and never lets himself get pinned.`],
   setup:`He uses movement and the jab to bank rounds and frustrate punchers, making them chase and miss until they tire. When he chose to, he'd plant and let combinations go against an exhausted opponent.`,
   why:`A mobile fighter who controls range turns a power-puncher's fight into an endurance test the puncher can't win — you can't knock out what you can't catch, and chasing burns the legs that power needs.`,
   counter:`A cutting-off-the-ring pressure fighter with a great hook (Joe Frazier's blueprint) who closes the space and bangs the body forces Ali to plant and trade, neutralising the movement.`,
   drill:[`Movement rounds: circle and pump the jab while never standing still — score and glide.`,
     `Ring-cutting awareness — practise recognising and stepping out of corners before you're trapped.`,
     `Long-jab accuracy on the move: land the jab while stepping back and laterally.`],
   iq:`Ali understood the fight beyond the punches — pace, geography and psychology. He'd lose exchanges on purpose to win the war, and he made opponents fight his fight.`,
   stat:`Won the heavyweight title three separate times across a career that spanned eras and styles.`,
   url:_yt('muhammad ali footwork jab breakdown')},

  {fighter:'Saenchai',nick:'',tag:'Muay Thai',title:'Lead-leg teep & feint game',
   record:'300+ wins (Muay Thai)',stance:'Orthodox/switch',division:'Lightweight (Muay Thai)',era:'1990s–present',
   desc:`Saenchai is Muay Thai's great artist — footwork, feints and a lead-leg teep that controls the entire ring. He makes elite opponents look amateur with timing and creativity, not size.`,
   signature:`The lead-leg teep (push kick) to the body and hip — a long, stiff jab with the foot that stops pressure, steals rhythm and resets distance whenever he wants.`,
   keys:[`Uses the teep like a jab — to measure, to interrupt, and to keep opponents at the end of his range.`,
     `Endless feints (cartwheel kicks, switch steps, hand traps) that freeze opponents and hide the real attack.`,
     `Switches stance fluidly to attack from new angles and confuse the read.`,
     `Superb balance — he can pull the teep back and re-chamber without ever being off-balance.`],
   setup:`He floods you with feints until you stop reacting to any of them, then the real strike lands clean. The teep keeps you at range while he sets the trap, and the creativity makes you defend everything, so you defend nothing well.`,
   why:`The lead teep is the longest, safest tool in Muay Thai — it controls distance with almost no risk and disrupts any forward rhythm. Built on feints, it makes the opponent hesitant, and a hesitant opponent is a slow one.`,
   counter:`Heavy, walk-through pressure from a bigger fighter who eats the teep and crowds the clinch can rob him of the space his game needs — size and weight are the equalisers his artistry can't always solve.`,
   drill:[`Teep-as-jab rounds: use the lead-leg push kick to control a partner's distance the way a jab would.`,
     `Feint-then-strike: show two fakes before every real attack to train the bait-first habit.`,
     `Balance drill: throw the teep and re-chamber to a stable stance without putting the foot down.`],
   iq:`Saenchai proves that control of distance and rhythm beats power — if the opponent never gets to set their feet or their timing, their strength never enters the equation.`,
   stat:`Multiple-time Lumpinee champion across weight classes, widely regarded among the greatest Muay Thai fighters ever.`,
   url:_yt('saenchai teep technique breakdown')},

  {fighter:'Buakaw',nick:'',tag:'Muay Thai',title:'Left kick & clinch dominance',
   record:'240+ wins (Muay Thai/kickboxing)',stance:'Orthodox',division:'Welterweight (Muay Thai)',era:'2000s–present',
   desc:`Buakaw built a global name on a thudding left body/head kick and suffocating clinch work. Physical, relentless and technically clean — pressure Muay Thai at its most effective.`,
   signature:`The left roundhouse kick to the body and head — set up behind punches, thrown with full rotation, hard enough to end fights or break the opponent's posture round after round.`,
   keys:[`Punches to draw the hands up, then the left kick comes underneath or over the top.`,
     `Dominant clinch — controls posture, lands knees, and turns/dumps opponents to win the position.`,
     `High pace and physical strength wear opponents down over the rounds.`,
     `Switches between body and head kick off the same setup so the guard can't cover both.`],
   setup:`He uses hands to occupy your guard, then the left kick attacks whichever level you left open. If you defend the kicks by closing distance, you fall into his clinch, where the knees take over. Every escape leads to another trap.`,
   why:`A hard kick that can target two levels off one setup forces an impossible guard choice, and a fighter who also owns the clinch removes the standard counter to kicks (closing the distance). You're punished for staying out and for coming in.`,
   counter:`Slick, mobile counter-strikers who won't engage the clinch and pick him apart on the outside (as some kickboxing losses showed) deny the phases he dominates.`,
   drill:[`Punch-into-kick: throw a jab-cross to occupy the guard, then fire the rear kick to the open level.`,
     `Clinch control rounds — fight for inside position, posture control and knees from the plum.`,
     `Same-setup, two-targets: alternate body and head kick off an identical hand feint.`],
   iq:`Buakaw shows that a simple, world-class weapon plus relentless pace beats complexity — you don't need fifty techniques if your three are unstoppable and you never stop coming.`,
   stat:`Two-time K-1 World MAX champion, bringing Muay Thai to a global kickboxing audience.`,
   url:_yt('buakaw left kick clinch breakdown')},

  {fighter:'Ramon Dekkers',nick:'The Diamond',tag:'Muay Thai',title:'Aggressive boxing in Muay Thai',
   record:'186-25-2 (Muay Thai)',stance:'Orthodox',division:'Lightweight (Muay Thai)',era:'1990s',
   desc:`The Dutchman who beat the Thais at their own game by importing heavy, aggressive hands. Dekkers fused European boxing power with Muay Thai kicks and forced a forward, violent pace few could match.`,
   signature:`The boxing-into-kick blitz: heavy hooks and crosses to back the opponent up, finished with a low kick or body kick as their guard collapses — overwhelming, forward, non-stop.`,
   keys:[`Brings real boxing power and combinations into a Muay Thai range that wasn't ready for it.`,
     `Walks opponents down with pressure, refusing to give them space or rhythm.`,
     `Chains punches into kicks seamlessly so the kick lands while the hands are still being defended.`,
     `Iron will and pace — he made every fight a war of attrition he was conditioned to win.`],
   setup:`He overwhelms with hands to force the guard high and the opponent backward, then the kicks land low and to the body where the attention isn't. The aggression itself is the setup — pressure removes the opponent's time to think.`,
   why:`Forcing a fighter to constantly defend power punches steals their offence and their composure; chaining kicks onto the end of boxing combinations attacks targets the opponent has stopped protecting. Pace converts skill exchanges into willpower contests.`,
   counter:`Disciplined Muay Thai technicians who use the teep and clinch to break his rhythm and keep him at range (his great rivalry with Coban showed both sides) can stall the blitz.`,
   drill:[`Hands-to-kick blitz: throw a 3-4 punch boxing combination and finish on a low or body kick, every set.`,
     `Pressure rounds: walk a partner down behind combinations without letting them set their feet.`,
     `Conditioning rounds at high output — the style demands a tank, so build it.`],
   iq:`Dekkers proved styles can be hacked — importing a weapon (boxing) the dominant tradition under-trained against rewrote what was possible in the ring.`,
   stat:`The first Western fighter to be truly feared in Thailand, twice named Muay Thai's fighter of the year by Thai media.`,
   url:_yt('ramon dekkers boxing muay thai breakdown')},

  {fighter:'Rodtang',nick:'The Iron Man',tag:'Muay Thai',title:'Pressure, durability & volume',
   record:'270+ wins (Muay Thai)',stance:'Orthodox',division:'Flyweight (Muay Thai)',era:'2015–present',
   desc:`Rodtang fights like a forward-marching machine — head down, hands up, walking through fire to land relentless volume. His durability lets him pressure in a way most fighters physically can't afford to.`,
   signature:`The walk-through-to-land pressure: he accepts a shot to give two back, marching opponents to the ropes behind constant hooks, kicks and knees until they break.`,
   keys:[`Elite chin and toughness let him close distance through the opponent's offence.`,
     `Constant forward pressure denies opponents the space and time to set up.`,
     `High volume of hooks, low kicks and knees in the pocket and clinch.`,
     `Never stops coming — the psychological weight of unrelenting pressure is part of the weapon.`],
   setup:`He absorbs early offence to get inside, then overwhelms with volume once he's there. The durability is the entry tool — opponents land but he keeps coming, and that breaks their belief before it breaks his body.`,
   why:`Pressure works when the opponent can't make you pay enough to stop — Rodtang's chin lets him cross the danger zone, and once inside, his volume wins every exchange. Relentlessness is a tax the opponent pays in legs and morale.`,
   counter:`Long, mobile fighters who use the teep, footwork and angles to keep him at range and refuse the pocket can pile up points before he gets to work — durability doesn't help if he can't close.`,
   drill:[`Pressure-volume rounds: march a moving partner down behind a steady stream of strikes.`,
     `Defensive-shell entries — practise crossing distance behind a tight guard so you can pressure safely.`,
     `Clinch-and-knee work to capitalise the moment you've forced the opponent to the ropes.`],
   iq:`Rodtang weaponises will — when an opponent realises nothing they throw will stop him, the fight is half-lost before the damage even accumulates.`,
   stat:`Long-reigning ONE Championship flyweight Muay Thai champion, famous for a granite chin and a crowd-pleasing pace.`,
   url:_yt('rodtang pressure muay thai breakdown')},

  {fighter:'Khabib Nurmagomedov',nick:'The Eagle',tag:'Wrestling',title:'Chain wrestling & top pressure',
   record:'29-0 (MMA)',stance:'Orthodox',division:'Lightweight',era:'2012–2020',
   desc:`The most dominant grappler in MMA history. Khabib's relentless level changes, mat returns and smothering top pressure made world-class fighters look helpless — he didn't just take you down, he buried you there.`,
   signature:`The chain-wrestling sequence: a missed shot flows into a body lock, into a trip, into a mat return — endless attempts linked together until the takedown is inevitable.`,
   keys:[`Never relies on one takedown — he chains attempts so defending the first only opens the next.`,
     `Crushing top pressure and hip control keep the opponent flat and exhausted.`,
     `Mat returns: the instant you stand, he drags you back down before you can square up.`,
     `Heavy ground-and-pound from dominant position forces you to give up your neck or your position.`],
   setup:`He uses the threat of the takedown to back you to the cage, ties up, and chains attempts until one lands. Once on top, he sits in your hips, makes you carry his weight, and lets exhaustion do the work before the finish.`,
   why:`Chained takedowns defeat takedown defence because defending uses energy and only buys a second before the next attempt; sustained top control compounds that fatigue. The opponent isn't beaten by one move — they're beaten by never getting a break from the wrestling.`,
   counter:`Strong takedown defence buys time but rarely a full escape; the realistic blueprint is to hurt him early standing before the grappling phase begins and to make every scramble cost him — though no one managed it over a full fight.`,
   drill:[`Chain-wrestling reps: shot → re-shot → body lock → trip, flowing without stopping between attempts.`,
     `Mat-return drill: as your partner stands from bottom, drag them back down before they re-square.`,
     `Top-pressure rounds — hold side control/mount and stay heavy, denying the bottom player's hips.`],
   iq:`Khabib won the mental fight first — opponents knew they couldn't keep it standing, and that dread shaped every decision they made before he even shot.`,
   stat:`Retired undefeated at 29-0, defending the UFC lightweight title and never losing a round in most fights.`,
   url:_yt('khabib chain wrestling top pressure breakdown')},

  {fighter:'Georges St-Pierre',nick:'GSP',tag:'MMA',title:'Level-change takedowns & the jab',
   record:'26-2 (MMA)',stance:'Orthodox/switch',division:'Welterweight / Middleweight',era:'2006–2017',
   desc:`The most complete MMA fighter of his era. GSP fused an Olympic-level double leg with a stiff, fight-controlling jab — he could out-box you to set up the takedown, or threaten the takedown to land the jab.`,
   signature:`The superman-jab-to-double-leg: he fakes the lead hand high, you react up, and he changes levels into a textbook double leg before your defence can drop.`,
   keys:[`A long, accurate jab controls range and racks up points while hiding the level change.`,
     `Explosive, low double-leg with deep penetration and finish off the cage.`,
     `Uses each threat to set up the other — strike fear opens the shot, shot fear opens the jab.`,
     `Dominant top control and ground-and-pound once the takedown lands.`],
   setup:`He establishes the jab to win the standing exchanges and force respect, then drops levels on the same look once the hands are occupied. The opponent has to defend two completely different attacks off one motion, and can't do both.`,
   why:`A fighter who is genuinely elite at two phases that counter each other is nearly unsolvable — defend the strikes and you eat the takedown, defend the takedown and you eat the jab. The opponent's correct read is always wrong half the time.`,
   counter:`A single perfectly-timed counter (as in his one upset loss) is the historical chink — and a fighter elite enough to be a credible threat in both phases simultaneously could force harder choices, though almost none existed.`,
   drill:[`Jab-to-shot: throw the lead hand high, then immediately change levels into a double leg on the reaction.`,
     `Penetration-step drill: deep, low double-leg entries with proper level change, not bending at the waist.`,
     `Phase-link sparring — score by threatening both a strike and a takedown off the same setup.`],
   iq:`GSP game-planned like a chess player and adapted mid-fight better than anyone — he studied opponents obsessively and beat them with their own tendencies.`,
   stat:`Welterweight champion for years, then returned from a long layoff to win a second title at middleweight.`,
   url:_yt('georges st pierre takedown jab breakdown')},

  {fighter:'Demetrious Johnson',nick:'Mighty Mouse',tag:'MMA',title:'Seamless phase transitions',
   record:'25-4-1 (MMA)',stance:'Orthodox/switch',division:'Flyweight',era:'2012–2018',
   desc:`The most technically seamless fighter MMA has produced. DJ flows between striking, wrestling and submissions with no visible seam — a strike becomes a takedown becomes a submission in one unbroken motion.`,
   signature:`The strike-to-takedown-to-submission flow: he'll throw a combination, change levels into a takedown off the opponent's reaction, and transition straight into a submission — the famous flying-armbar suplex being the highlight version.`,
   keys:[`No seams between phases — striking, wrestling and grappling are one continuous skill set.`,
     `Reads the opponent's reaction to one threat and flows into the counter to it.`,
     `Elite speed and timing in transitions, where most fighters are vulnerable.`,
     `Creative finishing — he attacks submissions from positions others wouldn't see.`],
   setup:`He attacks in one phase, reads how you defend, and flows into the phase that beats your defence — strike, you cover, he shoots; you sprawl, he transitions; you scramble, he submits. There's no pause for you to reset between phases.`,
   why:`Most fighters are vulnerable in the transition between phases (the moment between striking and wrestling); DJ lives in those transitions, so he attacks exactly when opponents are least defended. Seamlessness removes the opponent's reset.`,
   counter:`Larger, powerful opponents who can disrupt his flow with strength in the scrambles (the one fighter who beat him leaned on size) present the rare problem — raw physicality interrupting the technical flow.`,
   drill:[`Phase-flow drill: strike → level change → submission, flowing without stopping between phases.`,
     `Transition attacks — practise attacking in the moment between phases, not just from set positions.`,
     `Reaction-chaining: respond to a partner's defence by flowing to the technique that beats it.`],
   iq:`DJ proved that the seams between disciplines are where fights are won — eliminate your own seams and you attack the opponent precisely where they're weakest.`,
   stat:`Holds the record for the most consecutive UFC title defences, with a series of highlight-reel finishes.`,
   url:_yt('demetrious johnson transitions breakdown')},

  {fighter:'Fedor Emelianenko',nick:'The Last Emperor',tag:'Sambo',title:'Sambo, ground-and-pound & calm',

  if(!keep.length)keep.push('You put in the reps and reviewed the tape honestly — that habit is what actually builds fighters.');
  const kb=_kbMatch(kind+' '+(S.profile&&(S.profile.disciplines||[]).join(' ')||''));
  const drill=kb&&kb.drill?`\n\n**Drill this week:** ${kb.drill}`:'';
  return `## Frame-by-frame read\nFrom the motion I measured across your ${kind} clip, I see ${obs.slice(0,3).join(', ')}.\n\n_Measured: ${metricsText(m)}._\n\n## Fix this\n${fixes.slice(0,3).map((f,i)=>`${i+1}. ${f}`).join('\n')}\n\n## Keep doing\n${keep[0]}${drill}`;
}
function clipVizHTML(s,m){
  const maxM=Math.max(0.0001,...m.motion);
  const strip=s.thumbs.map((src,i)=>{
    const mv=i===0?0:(m.motion[i-1]||0);const h=Math.round((mv/maxM)*100);
    return `<div class="vf"${src?'':' style="background:#111"'}>${src?`<img src="${src}" alt="frame ${i+1}" loading="lazy">`:''}<div class="vf-bar"><span style="height:${h}%"></span></div></div>`;
  }).join('');
  const bars=[['Hands/head',m.regionTop],['Pocket/core',m.regionMid],['Legs/level',m.regionBot]];
  const reg=bars.map(([l,v])=>`<div class="vreg"><span class="vreg-l">${l}</span><div class="vreg-t"><span style="width:${Math.round(v*100)}%"></span></div><span class="vreg-v">${Math.round(v*100)}%</span></div>`).join('');
  return `<div class="clip-viz mb"><div class="fz11 muted mb-1">${s.thumbs.length} frames sampled across ${m.dur.toFixed(1)}s · bar height = motion between frames</div>
    <div class="vf-strip">${strip}</div>
    <div class="vreg-wrap mt">${reg}</div></div>`;
}
async function analyzeTape(id){

  const out=$('#tapeOut-'+id);if(out)out.innerHTML='<div class="muted fz12"><span class="typing"><i></i><i></i><i></i></span> Sampling frames and analysing motion on your device…</div>';
  try{
    const s=await sampleClip(url,12);
    if(!s.thumbs.length)throw new Error('Could not extract frames from this clip.');
    const m=clipMetrics(s);
    let review;
    if(aiConfigured()){
      const sys=`You are an elite MMA coach reviewing a fighter's ${kind} footage. ${fullCoachContext()} You are shown frames sampled in order across one clip, plus measured motion signals. Analyse posture, stance, hand position, footwork, balance and technique. Respond in markdown: **What I see** (read the sequence), **Fix this** (2-3 specific corrections with drilling cues), **Keep doing** (one strength). Be specific and direct like a real corner. Under 200 words.`;
      const content=s.thumbs.slice(0,8).filter(Boolean).map(b=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b.split(',')[1]}}));
      content.push({type:'text',text:`Measured motion signals from the clip: ${metricsText(m)}. The frames above are in order from my ${kind} clip. Break down my technique.`});
      try{review=await callClaude([{role:'user',content}],sys,800);}catch(e){review=localVisionReview(m,kind);}
    }else{
      review=localVisionReview(m,kind);
    }
    t.analysis=review||'';saveNow();
    if(out)out.innerHTML=clipVizHTML(s,m)+(review?`<div class="ai-bubble">${md(review)}</div>`:'');
  }catch(e){if(out)out.innerHTML=`<div class="banner red"><div>${esc(friendlyAIError(e))}</div></div>`;}
}

<script>

        <tbody>${fights.map(f=>`<tr><td class="mono fz11">${fmtShort(f.date)}</td><td>${esc(f.opponent)}</td>

const FIGHT_METHODS=['KO/TKO','Submission','Decision'];

function drawMethodDonut(){
  const c=$('#methodDonut');if(!c)return;const ctx=c.getContext('2d');
  const w=c.width=c.offsetWidth,h=c.height;ctx.clearRect(0,0,w,h);
  const wins=S.fights.filter(f=>f.result==='Win');if(!wins.length)return;
  const cats={'KO/TKO':0,'Submission':0,'Decision':0,'Other':0};
  wins.forEach(f=>{cats[f.method]!==undefined?cats[f.method]++:cats['Other']++;});
  const colors={'KO/TKO':'#E63946','Submission':'#C8A84B','Decision':'#3FB950','Other':'#888'};
  const entries=Object.entries(cats).filter(([k,v])=>v>0);
  const total=wins.length;const cx=w/2,cy=h/2,r=Math.min(w,h)/2-10,ir=r*0.6;
  let a=-Math.PI/2;
  entries.forEach(([k,v])=>{const slice=v/total*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a,a+slice);ctx.closePath();ctx.fillStyle=colors[k];ctx.fill();a+=slice;});

  ctx.fillStyle='#F5F5F5';ctx.textAlign='center';ctx.font='600 22px Bebas Neue';ctx.fillText(total+' W',cx,cy+4);

function delRanking(id){S.rankings=S.rankings.filter(r=>r.id!==id);save();window._afterRender=drawRankChart;go('competition');}
function drawRankChart(){
  const c=$('#rankChart');if(!c)return;const ctx=c.getContext('2d');
  const w=c.width=c.offsetWidth,h=c.height;ctx.clearRect(0,0,w,h);
  const data=[...S.rankings].sort((a,b)=>a.date<b.date?-1:1);if(data.length<2)return;
  const ranks=data.map(d=>d.rank);const max=Math.max(...ranks),min=Math.min(...ranks);

  ctx.stroke();
  data.forEach((d,i)=>{const x=pad+i*xs;const y=pad+((d.rank-min)/Math.max(1,max-min))*(h-pad*2);ctx.fillStyle='#C8A84B';ctx.beginPath();ctx.arc(x,y,4,0,7);ctx.fill();

}
function beltColor(b){const m={'White':'#E8E8E8','Blue':'#2D6CDF','Purple':'#7B4FB5','Brown':'#7A4B2B','Black':'#1A1A1A','Yellow':'#E6C235','Orange':'#E6852F','Green':'#3FB950','Red':'#E63946'};

async function toggleReminders(){
  const r=S.reminders;
  if(!r.enabled){
    if(typeof Notification==='undefined'){toast('Notifications not supported on this device','red');return;}
    let perm=Notification.permission;
    if(perm==='default'){try{perm=await Notification.requestPermission();}catch(e){}}
    if(perm!=='granted'){toast('Allow notifications to enable reminders','red');go('settings');return;}
    r.enabled=true;saveNow();toast('Reminders on','green');scheduleReminderCheck();
  }else{r.enabled=false;saveNow();toast('Reminders off');}
  go('settings');
}
function setReminderTime(v){S.reminders.time=v||'18:00';saveNow();toast('Reminder time set');}

function fireReminder(){
  const body='Time to get your work in. Log a session, drill, or watch some film.';
  try{
    if(navigator.serviceWorker&&navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>reg.showNotification('OCTAGON — Training time 🥊',{body,tag:'octagon-train',badge:undefined})).catch(()=>new Notification('OCTAGON — Training time 🥊',{body}));
    }else if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
      new Notification('OCTAGON — Training time 🥊',{body});
    }
  }catch(e){}
}
function testReminderNow(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted'){toast('Enable reminders first','red');return;}
  fireReminder();toast('Test reminder sent','green');
}
let _reminderTimer=null;
function scheduleReminderCheck(){
  if(_reminderTimer)return; // single interval for the session
  _reminderTimer=setInterval(checkReminderDue,60000);

}
function checkReminderDue(){
  const r=S.reminders;if(!r||!r.enabled)return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const now=new Date();
  if((r.days||[]).indexOf(now.getDay())<0)return;
  const [hh,mm]=(r.time||'18:00').split(':').map(Number);
  const todayKey=now.toISOString().slice(0,10);
  if(r.lastFired===todayKey)return; // already fired today
  // fire if we're at/after the scheduled minute (within the day)
  if(now.getHours()>hh||(now.getHours()===hh&&now.getMinutes()>=mm)){
    fireReminder();r.lastFired=todayKey;saveNow();
  }
}

/* ============================================================
   CLOUD SYNC — Supabase backend (auth + per-user JSON document)
   ============================================================ */
let _sb=null;            // supabase client
let cloudBusy=false;     // network in-flight
let _autoSyncTimer=null; // debounce for autoSync pushes
const SUPA_TABLE='octagon_state';
const SUPABASE_SQL=`-- Run this in Supabase → SQL Editor (one time)
create table if not exists public.octagon_state (
  user_id uuid primary key references auth.users(id) on delete cascade,
  data jsonb not null default '{}'::jsonb,
  updated_at timestamptz not null default now()
);
alter table public.octagon_state enable row level security;
create policy "own row select" on public.octagon_state
  for select using (auth.uid() = user_id);
create policy "own row upsert" on public.octagon_state
  for insert with check (auth.uid() = user_id);
create policy "own row update" on public.octagon_state
  for update using (auth.uid() = user_id) with check (auth.uid() = user_id);`;

// Edge Function source — holds the Anthropic key server-side so users never paste one.
const EDGE_FN_CODE=`// supabase/functions/anthropic-proxy/index.ts
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const ANTHROPIC_API_KEY = Deno.env.get("ANTHROPIC_API_KEY")!;
const SUPABASE_URL = Deno.env.get("SUPABASE_URL")!;
const SUPABASE_ANON_KEY = Deno.env.get("SUPABASE_ANON_KEY")!;

const cors = {
  "Access-Control-Allow-Origin": "*",
  "Access-Control-Allow-Headers": "authorization, x-client-info, apikey, content-type",
  "Access-Control-Allow-Methods": "POST, OPTIONS",
};

Deno.serve(async (req) => {
  if (req.method === "OPTIONS") return new Response("ok", { headers: cors });
  try {
    // require a signed-in Supabase user (their JWT is forwarded by the app)
    const authHeader = req.headers.get("Authorization") || "";
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      global: { headers: { Authorization: authHeader } },
    });
    const { data: { user } } = await sb.auth.getUser();
    if (!user) {
      return new Response(JSON.stringify({ error: { message: "Unauthorized" } }),
        { status: 401, headers: { ...cors, "Content-Type": "application/json" } });
    }

    // forward the Anthropic Messages body verbatim, injecting the secret key
    const body = await req.text();
    const upstream = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
      },
      body,
    });
    // pipe the response straight back (handles both JSON and SSE streaming)
    return new Response(upstream.body, {
      status: upstream.status,
      headers: { ...cors, "Content-Type": upstream.headers.get("Content-Type") || "application/json" },
    });
  } catch (e) {
    return new Response(JSON.stringify({ error: { message: String((e as Error)?.message || e) } }),
      { status: 500, headers: { ...cors, "Content-Type": "application/json" } });
  }
});`;
const EDGE_DEPLOY=`# One-time: install the Supabase CLI, then from your project folder:
supabase login
supabase link --project-ref <your-project-ref>

# Create the function and paste the code above into its index.ts
supabase functions new anthropic-proxy

# Store your Anthropic key as a server-side secret (never shipped to the browser)
supabase secrets set ANTHROPIC_API_KEY=sk-ant-your-key

# Deploy
supabase functions deploy anthropic-proxy`;

async function loadSupabaseLib(){
  if(window.supabase&&window.supabase.createClient)return window.supabase;
  // dynamic ESM import from CDN — no build step required
  const mod=await import('https://esm.sh/@supabase/supabase-js@2');
  window.supabase={createClient:mod.createClient};
  return window.supabase;
}
function applyConfigCreds(){
  // Turnkey: if the deployer hardcoded Supabase creds in CONFIG, seed them once.
  if(CONFIG.supabaseUrl&&!S.cloud.url)S.cloud.url=CONFIG.supabaseUrl;
  if(CONFIG.supabaseAnonKey&&!S.cloud.anonKey)S.cloud.anonKey=CONFIG.supabaseAnonKey;
}
async function ensureClient(){
  applyConfigCreds();
  const c=S.cloud;
  if(!c.url||!c.anonKey)throw new Error('Add your Supabase project URL and anon key first.');
  if(_sb&&_sb.__url===c.url)return _sb;
  const lib=await loadSupabaseLib();
  _sb=lib.createClient(c.url.trim(),c.anonKey.trim(),{auth:{persistSession:true,storageKey:'octagon_supabase_auth'}});
  _sb.__url=c.url;
  return _sb;
}
function cloudSetField(k,v){S.cloud[k]=v;save();}
function rerenderCloud(){if(currentRoute==='settings'&&settingsTab==='cloud')go('settings');}

async function cloudSaveCreds(){
  S.cloud.url=($('#sbUrl').value||'').trim();
  S.cloud.anonKey=($('#sbKey').value||'').trim();
  _sb=null;saveNow();
  if(!S.cloud.url||!S.cloud.anonKey){toast('Enter both URL and anon key','red');return;}
  try{await ensureClient();
    // restore any existing session
    const {data}=await _sb.auth.getSession();
    if(data&&data.session){S.cloud.userId=data.session.user.id;S.cloud.email=data.session.user.email;saveNow();}
    toast('Supabase connected','green');
  }catch(e){toast('Connect failed: '+e.message,'red');}
  rerenderCloud();
}
async function cloudAuth(mode){
  const email=($('#sbEmail').value||'').trim();const pw=($('#sbPw').value||'').trim();
  if(!email||!pw){toast('Enter email and password','red');return;}
  if(pw.length<6){toast('Password must be 6+ characters','red');return;}
  cloudBusy=true;rerenderCloud();
  try{
    const sb=await ensureClient();
    let res;
    if(mode==='signup')res=await sb.auth.signUp({email,password:pw});
    else res=await sb.auth.signInWithPassword({email,password:pw});
    if(res.error)throw res.error;
    const user=res.data.user||(res.data.session&&res.data.session.user);
    if(mode==='signup'&&!res.data.session){toast('Check your email to confirm, then sign in','gold');cloudBusy=false;rerenderCloud();return;}
    S.cloud.userId=user.id;S.cloud.email=user.email;saveNow();
    toast(mode==='signup'?'Account created':'Signed in','green');
    // pull existing cloud data on first sign-in
    await cloudPull(true);
  }catch(e){toast('Auth failed: '+(e.message||e),'red');}
  cloudBusy=false;rerenderCloud();
}
async function cloudSignOut(){
  try{const sb=await ensureClient();await sb.auth.signOut();}catch(e){}
  S.cloud.userId='';S.cloud.email='';S.cloud.autoSync=false;saveNow();
  toast('Signed out');rerenderCloud();refreshTopbar();
}
function _syncableState(){
  // strip the cloud creds so they never leave the device inside the doc payload
  const copy=JSON.parse(JSON.stringify(S));
  if(copy.cloud){copy.cloud={url:'',anonKey:'',email:'',userId:'',autoSync:copy.cloud.autoSync,lastSync:copy.cloud.lastSync};}
  return copy;
}
async function cloudPush(silent){
  if(!S.cloud.userId){if(!silent)toast('Sign in first','red');return;}
  cloudBusy=true;if(!silent)rerenderCloud();
  try{
    const sb=await ensureClient();
    const payload={user_id:S.cloud.userId,data:_syncableState(),updated_at:new Date().toISOString()};
    const {error}=await sb.from(SUPA_TABLE).upsert(payload,{onConflict:'user_id'});
    if(error)throw error;
    S.cloud.lastSync=new Date().toISOString();saveNow();
    if(!silent)toast('Pushed to cloud','green');
  }catch(e){if(!silent)toast('Push failed: '+(e.message||e),'red');else console.warn('autosync push failed',e);}
  cloudBusy=false;if(!silent)rerenderCloud();
}
async function cloudPull(silent){
  if(!S.cloud.userId){if(!silent)toast('Sign in first','red');return;}
  cloudBusy=true;if(!silent)rerenderCloud();
  try{
    const sb=await ensureClient();
    const {data,error}=await sb.from(SUPA_TABLE).select('data,updated_at').eq('user_id',S.cloud.userId).maybeSingle();
    if(error)throw error;
    if(!data||!data.data||!Object.keys(data.data).length){if(!silent)toast('No cloud data yet — push first','gold');cloudBusy=false;rerenderCloud();return;}
    const incoming=data.data;
    // preserve device-local cloud creds
    const keepCloud=S.cloud;
    S=deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)),incoming);
    S.cloud=keepCloud;
    S.cloud.lastSync=new Date().toISOString();
    saveNow();applyTheme();refreshTopbar();buildNav();
    coachChat=S.coachMessages&&S.coachMessages.length?S.coachMessages.slice():[];
    if(!silent)toast('Pulled from cloud','green');
    go(silent?currentRoute:'dashboard');
  }catch(e){if(!silent)toast('Pull failed: '+(e.message||e),'red');cloudBusy=false;rerenderCloud();}
}
function toggleAutoSync(){
  if(!S.cloud.userId){toast('Sign in first','red');return;}
  S.cloud.autoSync=!S.cloud.autoSync;saveNow();
  toast('Auto-sync '+(S.cloud.autoSync?'on':'off'),S.cloud.autoSync?'green':'');
  rerenderCloud();
}
function copyText(cls,msg){
  const el=document.querySelector('.'+cls);if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast(msg||'Copied','green')).catch(()=>toast('Copy failed','red'));
}
// auto-sync hook: debounced push after local saves
function scheduleAutoSync(){
  if(!S.cloud||!S.cloud.autoSync||!S.cloud.userId)return;
  clearTimeout(_autoSyncTimer);
  _autoSyncTimer=setTimeout(()=>cloudPush(true),4000);

async function tryRestoreCloudSession(){

function _hexFromBuf(buf){return Array.from(new Uint8Array(buf),b=>b.toString(16).padStart(2,'0')).join('');}
function _genSalt(){const a=new Uint8Array(16);(crypto.getRandomValues?crypto:window.crypto).getRandomValues(a);return _hexFromBuf(a.buffer);}
async function _hashPw(pw,salt){
  const data=new TextEncoder().encode(salt+':'+pw);
  if(crypto&&crypto.subtle&&crypto.subtle.digest){
    return _hexFromBuf(await crypto.subtle.digest('SHA-256',data));
  }
  // fallback (non-secure contexts only): simple non-crypto digest so the field still works
  let h=0x811c9dc5;for(let i=0;i<data.length;i++){h^=data[i];h=Math.imul(h,0x01000193);}
  return 'fnv'+(h>>>0).toString(16);
}
async function welcomeEnter(){
  const g=id=>{const e=$('#'+id);return e?e.value:'';};

  if(pw!==pw2)return fail("Passwords don't match.");

  const salt=_genSalt();
  const hash=await _hashPw(pw,salt);
  S.profile.name=name;
  S.account={name,email:email.toLowerCase(),salt,hash,createdAt:Date.now()};
  if(S.cloud)S.cloud.email=S.cloud.email||email.toLowerCase();

function obValidate(){

function finishOnboarding(){

/* ---------- PWA: manifest, install prompt, service worker ---------- */
const APP_ICON="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230A0A0A'/%3E%3Cpath d='M256 96l116 67v134l-116 67-116-67V163z' fill='none' stroke='%23C8A84B' stroke-width='22' stroke-linejoin='round'/%3E%3C/svg%3E";
let _deferredPrompt=null;
function initPWA(){
  // inject web app manifest as a blob
  try{
    const manifest={name:'OCTAGON — Fighter’s Companion',short_name:'OCTAGON',
      start_url:'.',display:'standalone',background_color:'#0A0A0A',theme_color:'#0A0A0A',
      orientation:'portrait-primary',
      description:'Your personal MMA training companion.',
      icons:[{src:APP_ICON,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  }catch(e){}
  // install prompt (Android/desktop Chrome fire beforeinstallprompt)
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_deferredPrompt=e;showInstallChip();});
  window.addEventListener('appinstalled',()=>{_deferredPrompt=null;const c=$('#installChip');if(c)c.remove();const b=$('#iosInstall');if(b)b.remove();toast('OCTAGON installed','green');});
  // iOS Safari never fires beforeinstallprompt — show a custom Add-to-Home-Screen hint.
  try{maybeShowIOSInstall();}catch(_){}
  // service worker for offline app shell + RELIABLE auto-update (http/https only).
  // (The old build registered the worker from a blob: URL, which Chrome rejects and
  //  which can never self-update — leaving users stuck on a stale cached app. We now
  //  register a real same-origin sw.js that is strictly network-first, and we actively
  //  purge any stale/blob workers + old caches so nobody gets pinned to an old version.)
  if('serviceWorker'in navigator&&location.protocol.startsWith('http')){
    // When a new version takes control, reload once so the user is never left on stale code.
    let _swRefreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(_swRefreshing)return;_swRefreshing=true;try{location.reload();}catch(_){}
    });
    (async()=>{
      try{
        // 1) Remove leftover workers from older builds (blob workers, or anything not our sw.js).
        const regs=await navigator.serviceWorker.getRegistrations();
        for(const reg of regs){
          const u=(reg.active&&reg.active.scriptURL)||(reg.waiting&&reg.waiting.scriptURL)||(reg.installing&&reg.installing.scriptURL)||'';
          if(!u||u.startsWith('blob:')||!/\/sw\.js$/.test(u)){try{await reg.unregister();}catch(_){}}
        }
      }catch(_){}
      try{
        // 2) One-time cache purge when the build changes (belt-and-suspenders vs. stale HTML).
        const BUILD='2026-06-25c';
        if(localStorage.getItem('octagon_build')!==BUILD){
          if('caches'in window){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)));}
          localStorage.setItem('octagon_build',BUILD);
        }
      }catch(_){}
      // 3) Register the real, self-updating worker.
      try{await navigator.serviceWorker.register('sw.js',{scope:'./'});}catch(_){/* degrade silently */}
    })();
  }
}
function showInstallChip(){
  if($('#installChip'))return;
  const c=document.createElement('button');c.id='installChip';c.className='install-chip';
  c.innerHTML=icon('plus')+'<span>Install app</span>';
  c.onclick=async()=>{if(!_deferredPrompt)return;_deferredPrompt.prompt();await _deferredPrompt.userChoice;_deferredPrompt=null;c.remove();};
  document.body.appendChild(c);
}
function _isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent||'')&&!window.MSStream;}
function _isStandalone(){
  return window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);
}
function maybeShowIOSInstall(){
  if(!_isIOS()||_isStandalone())return;                       // only un-installed iOS Safari
  if(localStorage.getItem('octagon_ios_install')==='dismissed')return;
  if($('#iosInstall'))return;
  // wait a beat so it doesn't fight the onboarding modal on the very first paint
  setTimeout(()=>{
    if(_isStandalone()||$('#iosInstall'))return;
    const b=document.createElement('div');b.id='iosInstall';b.className='ios-install';
    b.innerHTML=`<div class="ii-icon"><svg viewBox="0 0 30 34" fill="none"><path d="M15 1L28 8.5V25.5L15 33L2 25.5V8.5L15 1Z" stroke="#C8A84B" stroke-width="1.5"/><path d="M15 7L22.5 11.5V20.5L15 25L7.5 20.5V11.5L15 7Z" stroke="#C8A84B" stroke-width="1" opacity="0.5"/></svg></div>
      <div class="ii-txt"><b>Add OCTAGON to your Home Screen</b> — tap <svg class="ii-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M8 8l4-4 4 4M5 12v7a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-7"/></svg> then <b>Add to Home Screen</b> for full-screen, offline access.</div>
      <button class="ii-x" aria-label="Dismiss" onclick="dismissIOSInstall()">&times;</button>`;
    document.body.appendChild(b);
  },1600);
}
function dismissIOSInstall(){try{localStorage.setItem('octagon_ios_install','dismissed');}catch(_){}const b=$('#iosInstall');if(b)b.remove();}

/* ---------- ambient particle background ---------- */
function initBackgroundFX(){
  if(_reduceMotion)return;
  const cv=$('#bgfx');if(!cv)return;const ctx=cv.getContext('2d');
  let W,H,parts=[];const DPR=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    const count=Math.max(36,Math.min(56,Math.round(W*H/26000)));
    parts=[];for(let i=0;i<count;i++)parts.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*0.5,vy:(Math.random()-.5)*0.5,
      r:Math.random()*1.6+0.6
    });
  }
  resize();
  let rzT;window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(resize,200);});
  function tick(){
    ctx.clearRect(0,0,W,H);
    for(const p of parts){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    }
    // links
    for(let i=0;i<parts.length;i++){
      for(let j=i+1;j<parts.length;j++){
        const a=parts[i],b=parts[j],dx=a.x-b.x,dy=a.y-b.y,d=dx*dx+dy*dy;
        if(d<15000){
          const o=(1-d/15000)*0.18;
          ctx.strokeStyle='rgba(200,168,75,'+o.toFixed(3)+')';
          ctx.lineWidth=0.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        }
      }
    }
    // nodes
    for(const p of parts){
      ctx.fillStyle='rgba(200,168,75,0.22)';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.283);ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
/* ---------- gold ripple on button clicks ---------- */
function initRipple(){
  document.addEventListener('click',e=>{
    if(_reduceMotion)return;
    const btn=e.target.closest&&e.target.closest('.btn');
    if(!btn||btn.disabled)return;
    const rect=btn.getBoundingClientRect();
    const size=Math.max(rect.width,rect.height);
    const sp=document.createElement('span');sp.className='ripple';
    sp.style.width=sp.style.height=size+'px';
    sp.style.left=(e.clientX-rect.left-size/2)+'px';
    sp.style.top=(e.clientY-rect.top-size/2)+'px';
    btn.appendChild(sp);
    setTimeout(()=>sp.remove(),460);
  });
}
/* ---------- occasional brand glitch ---------- */
function initBrandGlitch(){
  if(_reduceMotion)return;
  const el=document.querySelector('.brand .name b');if(!el)return;
  function loop(){
    const delay=8000+Math.random()*4000;
    setTimeout(()=>{
      el.classList.add('glitching');
      setTimeout(()=>el.classList.remove('glitching'),220);
      loop();
    },delay);
  }
  loop();
}
function _safe(fn,label){try{fn();}catch(e){try{console.warn('[octagon] '+label+' failed:',e);}catch(_){}}}
function boot(){
  // Each step is isolated so a single failure (e.g. a quirk when the file is
  // opened directly via file:// after AirDrop) can never white-screen the app.
  _safe(applyConfigCreds,'applyConfigCreds');
  _safe(seedIfEmpty,'seedIfEmpty');
  _safe(initBackgroundFX,'initBackgroundFX');
  _safe(initRipple,'initRipple');
  _safe(initBrandGlitch,'initBrandGlitch');
  _safe(applyTheme,'applyTheme');
  _safe(buildNav,'buildNav');
  _safe(initPWA,'initPWA');
  _safe(refreshTopbar,'refreshTopbar');
  // restore last route or default to dashboard
  let start='dashboard';
  try{const h=location.hash.replace('#','');if(h&&ROUTES[h])start=h;}catch(e){}
  try{go(start);}catch(e){
    try{go('dashboard');}catch(_){
      // last-resort: never leave a blank page
      const v=document.getElementById('view');
      if(v)v.innerHTML='<div style="padding:40px;text-align:center;color:#bbb;font-family:sans-serif">'
        +'<h2 style="color:#C8A84B">OCTAGON</h2><p>Loaded. Tap a section in the menu to begin.</p></div>';
    }
  }
  _safe(hideSplash,'hideSplash');
  _safe(resolveAuth,'resolveAuth');
  _safe(()=>{if(S.reminders&&S.reminders.enabled)scheduleReminderCheck();},'reminders');
}
function hideSplash(){
  const s=document.getElementById('splash');if(!s)return;
  s.classList.add('hide');setTimeout(()=>{try{s.remove();}catch(_){}} ,400);
}
// Global guard: surface unexpected errors instead of dying silently.
window.addEventListener('error',function(ev){try{console.warn('[octagon] runtime error:',ev.message);}catch(_){}});
/* ---------- launch flow ----------
   OCTAGON runs like a normal app — it NEVER blocks on a sign-in wall.
   We just go straight in. If the owner wired up optional Cloud Sync and a
   session already exists, we quietly restore it in the background. */
async function resolveAuth(){
  afterAuth();
  if(S.cloud.url&&S.cloud.anonKey){
    try{
      const sb=await ensureClient();
      const {data}=await sb.auth.getSession();
      if(data&&data.session){
        const u=data.session.user;
        if(u&&(!S.cloud.userId||S.cloud.userId!==u.id)){S.cloud.userId=u.id;S.cloud.email=u.email||S.cloud.email;saveNow();refreshTopbar();}
        if(S.cloud.autoSync)cloudPull(true);
      }
    }catch(e){}
  }
}
function afterAuth(){
  if(!S.onboarded){setTimeout(startOnboarding,300);return;}
}
let _agMode='signin';
function showAuthGate(mode){
  _agMode=mode||'signin';
  const g=$('#authGate');if(!g)return;
  const configured=!!(S.cloud.url&&S.cloud.anonKey);
  g.innerHTML=`<div class="ag-card">
    <div class="ag-logo"><svg viewBox="0 0 30 34" fill="none"><path d="M15 1L28 8.5V25.5L15 33L2 25.5V8.5L15 1Z" stroke="#C8A84B" stroke-width="1.5"/><path d="M15 7L22.5 11.5V20.5L15 25L7.5 20.5V11.5L15 7Z" stroke="#C8A84B" stroke-width="1" opacity="0.5"/></svg><span class="nm">OCTA<b>GON</b></span></div>
    <div class="ag-sub">Step into the cage. Sign in to sync your camp across every device and unlock your AI corner.</div>
    ${configured?`
    <div class="ag-tabs"><button class="${_agMode==='signin'?'on':''}" onclick="showAuthGate('signin')">Sign In</button><button class="${_agMode==='signup'?'on':''}" onclick="showAuthGate('signup')">Create Account</button></div>
    <input id="agEmail" class="field" type="email" placeholder="you@email.com" autocomplete="email" value="${esc(S.cloud.email||'')}">
    <input id="agPw" class="field" type="password" placeholder="Password (6+ characters)" autocomplete="${_agMode==='signup'?'new-password':'current-password'}" onkeydown="if(event.key==='Enter')authGateAuth('${_agMode}')">
    <div class="ag-err" id="agErr"></div>
    <button class="btn block" id="agSubmit" onclick="authGateAuth('${_agMode}')">${_agMode==='signup'?'Create Account & Enter':'Sign In'}</button>
    <span class="ag-guest" onclick="authGuest()">Continue as guest →</span>
    <div class="ag-note">Your data lives in your own Supabase project. The AI coach runs on a managed backend — no API key, ever.</div>`
    :`
    <div class="ag-err" id="agErr"></div>
    <button class="btn block" onclick="authGuest()">${icon('bolt')} Enter OCTAGON</button>
    <div class="ag-note">Cloud accounts aren't configured for this build yet. You're training locally — set up free cloud sign-in anytime under <b>Settings → Cloud Sync</b> to back up and sync across devices.</div>`}
  </div>`;
  g.classList.add('show');
  setTimeout(()=>{const f=$('#agEmail');if(f)f.focus();},80);
}
function hideAuthGate(){const g=$('#authGate');if(g){g.classList.remove('show');g.innerHTML='';}}
function authGuest(){
  S.settings.guest=true;saveNow();
  hideAuthGate();
  toast('Training locally — sign in anytime in Settings','gold');
  afterAuth();
}
async function authGateAuth(mode){
  const email=($('#agEmail')||{}).value?$('#agEmail').value.trim():'';
  const pw=($('#agPw')||{}).value||'';
  const err=$('#agErr');const btn=$('#agSubmit');
  const fail=m=>{if(err)err.textContent=m;else toast(m,'red');if(btn){btn.disabled=false;btn.textContent=mode==='signup'?'Create Account & Enter':'Sign In';}};
  if(err)err.textContent='';
  if(!email||!pw)return fail('Enter your email and password.');
  if(pw.length<6)return fail('Password must be at least 6 characters.');
  if(!S.cloud.url||!S.cloud.anonKey)return fail('Cloud not configured — continue as guest.');
  if(btn){btn.disabled=true;btn.textContent='…';}
  try{
    const sb=await ensureClient();
    const res=mode==='signup'?await sb.auth.signUp({email,password:pw}):await sb.auth.signInWithPassword({email,password:pw});
    if(res.error)throw res.error;
    if(mode==='signup'&&!res.data.session){fail('Account created — check your email to confirm, then sign in.');return;}
    const u=res.data.user||(res.data.session&&res.data.session.user);
    S.cloud.userId=u.id;S.cloud.email=u.email;S.settings.guest=false;saveNow();
    refreshTopbar();
    await cloudPull(true);     // merge any cloud data
    hideAuthGate();
    toast(mode==='signup'?'Welcome to OCTAGON':'Signed in','green');
    afterAuth();
  }catch(e){fail((e&&e.message)?e.message:'Authentication failed.');}
}
// keyboard: Esc closes modal
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
// redraw canvases on resize for the current view
let _rzT;window.addEventListener('resize',()=>{clearTimeout(_rzT);_rzT=setTimeout(()=>{if(currentRoute&&!$('#modalRoot').innerHTML)go(currentRoute);},250);});
boot();
</script>
